  <!-- iOS Home Screen Icon: AC leaf logo on white background -->
  <script>
  (function(){
    var c=document.createElement('canvas');
    c.width=c.height=180;
    var g=c.getContext('2d');
    // rounded white bg
    g.beginPath();
    g.moveTo(36,0);g.lineTo(144,0);g.arcTo(180,0,180,36,36);
    g.lineTo(180,144);g.arcTo(180,180,144,180,36);
    g.lineTo(36,180);g.arcTo(0,180,0,144,36);
    g.lineTo(0,36);g.arcTo(0,0,36,0,36);
    g.closePath();g.fillStyle='#fff';g.fill();g.clip();

    var G='#29B851';

    // ── main leaf body ─────────────────────────────────────
    // The AC leaf is a big rounded asymmetric blob, flat-ish on right, 
    // bulging left, with the "dent" notch at top-right where stem meets body
    g.beginPath();
    g.moveTo(100,22);                              // top, just left of stem notch
    g.bezierCurveTo(68,16,30,30,16,68);            // upper-left curve
    g.bezierCurveTo(4,98,6,130,20,152);            // left side down
    g.bezierCurveTo(36,174,64,184,92,178);         // bottom-left
    g.bezierCurveTo(116,174,138,162,148,146);      // bottom-right (above hole)
    // curl around the hole — go up-right then back
    g.bezierCurveTo(160,128,162,108,154,90);       // right side
    g.bezierCurveTo(148,74,138,58,128,44);         // upper right
    g.bezierCurveTo(120,32,112,24,100,22);         // back to top
    g.closePath();
    g.fillStyle=G;g.fill();

    // ── stem (upper right, tapered triangle pointing up-right) ──
    g.beginPath();
    g.moveTo(108,26);   // root on leaf
    g.lineTo(136,-4);   // tip
    g.lineTo(150,8);    // right edge of stem
    g.lineTo(128,38);   // back down to leaf
    g.closePath();
    g.fillStyle=G;g.fill();

    // ── white notch between stem and leaf body ──
    g.beginPath();
    g.moveTo(112,28);
    g.bezierCurveTo(116,18,128,18,132,28);
    g.bezierCurveTo(126,36,118,36,112,28);
    g.closePath();
    g.fillStyle='#fff';g.fill();

    // ── white circular hole (bottom-right of leaf) ──
    g.beginPath();
    g.arc(126,152,30,0,Math.PI*2);
    g.fillStyle='#fff';g.fill();

    var png=c.toDataURL('image/png');
    var lk=document.createElement('link');
    lk.rel='apple-touch-icon';lk.href=png;
    document.head.appendChild(lk);
  })();
  </script>

// Load data from Firestore; returns null on failure or no data
const fbLoad = async (uid) => {
  try {
    if (!uid || !window._fbDb || !window._fbDoc || !window._fbGetDoc) return null;
    const ref = window._fbDoc(window._fbDb, "users", uid);
    const snap = await window._fbGetDoc(ref);
    if (snap.exists()) return snap.data();
    return null;
  } catch (e) {
    console.warn("fbLoad error:", e);
    return null;
  }
};

// Save data to Firestore (fire-and-forget, non-blocking)
const fbSave = (uid, data) => {
  if (!uid || !window._fbDb || !window._fbDoc || !window._fbSetDoc) return;
  try {
    window._fbSetDoc(window._fbDoc(window._fbDb, "users", uid), data).catch(e => console.warn("fbSave error:", e));

    console.warn("fbSave error:", e);

};

const seededRand = (seed) => {
  let h=0; for(let i=0;i<seed.length;i++) h=Math.imul(31,h)+seed.charCodeAt(i)|0;
  return ()=>{ h^=h<<13; h^=h>>17; h^=h<<5; return (h>>>0)/4294967296; };
};

const getBadgeParams = (name,rarity) => {
  const r=seededRand(name+rarity);
  const sides=rarity==="legend"?[6,7,8][Math.floor(r()*3)]:rarity==="rare"?[4,5,6][Math.floor(r()*3)]:[0,3,4][Math.floor(r()*3)];
  const palettes=[
    ["#FF9A8B","#FFD3B6"],["#A8EDEA","#FED6E3"],["#A18CD1","#FBC2EB"],
    ["#FCCB90","#D57EEB"],["#84FAB0","#8FD3F4"],["#FDDB92","#D1FDFF"],
    ["#B7F8DB","#50A7C2"],["#FEC195","#FF7BB3"],["#E0C3FC","#8EC5FC"],
    ["#F9D976","#F39F86"],
  ];
  const pal=palettes[Math.floor(r()*palettes.length)];
  const rot=Math.floor(r()*360);
  return {sides,c1:pal[0],c2:pal[1],rot};
};

function BadgeSVG({name,rarity,size=60}){
  const p=getBadgeParams(name,rarity);
  const rc=RARITY_CFG[rarity];
  const cx=size/2,cy=size/2,r=size*.42;
  let shapePath=null;
  if(p.sides!==0){
    const pts=[];
    for(let i=0;i<p.sides;i++){
      const a=(i*2*Math.PI/p.sides)-Math.PI/2+(p.rot*Math.PI/180);
      pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);
    }
    // rounded polygon via quadratic curves
    shapePath=pts.map((pt,i)=>`${i===0?"M":"L"}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(" ")+"Z";
  }
  const uid=`b${name.charCodeAt(0)}${name.charCodeAt(1)||0}${rarity[0]}`;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:"block",filter:`drop-shadow(0 2px ${rarity==="legend"?8:4}px ${rc.glow})`}}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={p.c1}/>
          <stop offset="100%" stopColor={p.c2}/>
        </linearGradient>
      </defs>
      {shapePath===null
        ?<circle cx={cx} cy={cy} r={r} fill={`url(#g${uid})`} stroke={rc.border} strokeWidth={size*.05}/>
        :<path d={shapePath} fill={`url(#g${uid})`} stroke={rc.border} strokeWidth={size*.05} strokeLinejoin="round"/>
      }
      {rarity==="legend"&&<circle cx={cx} cy={cy} r={r*.65} fill="none" stroke="rgba(255,255,255,.35)" strokeWidth="1.5" strokeDasharray="3 3"/>}
      <circle cx={cx*.7} cy={cy*.65} r={size*.07} fill="rgba(255,255,255,.5)"/>
      <text x={cx} y={cy+size*.07} textAnchor="middle" fontSize={size*.2} fill="rgba(255,255,255,.95)" fontWeight="800" style={{fontFamily:"'Nunito','Noto Sans SC',sans-serif"}}>
        {name.slice(0,2)}
      </text>
    </svg>
  );
}

const grantBadge=(level,existing)=>{
  const rand=Math.random();
  let pool;
  if(level>=15&&rand<.15) pool=BADGE_LANDMARKS.filter(b=>b.rarity==="legend");
  else if(level>=5&&rand<.35) pool=BADGE_LANDMARKS.filter(b=>b.rarity==="rare");
  else pool=BADGE_LANDMARKS.filter(b=>b.rarity==="common");
  const owned=new Set(existing.map(b=>b.name));
  const avail=pool.filter(b=>!owned.has(b.name));
  const src=avail.length>0?avail:pool;
  const pick=src[Math.floor(Math.random()*src.length)];
  return{...pick,id:Date.now(),level,date:todayKey()};
};

const applyB = (stats,bonus={})=>{
  const out={};
  Object.keys(stats).forEach(k=>{out[k]={...stats[k],value:clamp(stats[k].value+(bonus[k]||0))};});
  return out;
};
// Apply bonus to longStats with overflow → flowers
const applyLongWithOverflow = (longStats, bonus={})=>{
  const out={...longStats};
  let extraFlowers=0;
  Object.keys(bonus).forEach(k=>{
    if(!out[k])return;
    const newVal=out[k].value+(bonus[k]||0);
    if(newVal>100){extraFlowers+=Math.floor(newVal-100);out[k]={...out[k],value:100};}
    else{out[k]={...out[k],value:Math.max(0,Math.round(newVal))};}
  });
  return{longStats:out,extraFlowers};
};

// Get week key in 年-W周 format (week starts Sunday)
const getWeekKey = (date=new Date())=>{
  const d=new Date(date);
  const day=d.getDay(); // 0=Sunday
  const sunday=new Date(d);sunday.setDate(d.getDate()-day);
  const y=sunday.getFullYear();
  const start=new Date(y,0,1);
  const weekNum=Math.ceil(((sunday-start)/86400000+start.getDay()+1)/7);
  return `${y}-W${weekNum}`;
};

// Get the Saturday of the current week
const getWeekSaturday = ()=>{
  const d=new Date();
  const day=d.getDay();
  const sat=new Date(d);sat.setDate(d.getDate()+(6-day));
  return sat;
};

// Count how many times a habit was checked this week (Sun–Sat)
const countWeekChecks=(checkedHabits,habitId)=>{
  let count=0;
  const now=new Date();
  const day=now.getDay();
  const sunday=new Date(now);sunday.setDate(now.getDate()-day);
  for(let i=0;i<=6;i++){
    const dt=new Date(sunday);dt.setDate(sunday.getDate()+i);
    const k=dt.toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});
    if(checkedHabits[k]&&checkedHabits[k][habitId])count++;
  }
  return count;
};

// Migrate old weeklyBonus.stat (string) to weeklyBonus.stats (array)
const migrateWeeklyBonus=(h)=>{
  if(!h.weeklyBonus) return {...h,weeklyBonus:{stats:[]},weeklyTarget:h.weeklyTarget||5};
  if(h.weeklyBonus.stat!==undefined&&!h.weeklyBonus.stats){
    const st=h.weeklyBonus.stat;
    return {...h,weeklyBonus:{stats:st?[st]:[]},weeklyTarget:h.weeklyTarget||5};
  }
  if(!h.weeklyBonus.stats) return {...h,weeklyBonus:{...h.weeklyBonus,stats:[]},weeklyTarget:h.weeklyTarget||5};
  if(h.weeklyTarget===undefined) return {...h,weeklyTarget:5};
  return h;
};

// Run weekly settlement - returns {newLongStats, extraFlowers, gains}
const runWeeklySettle=(habits,checkedHabits,longStats)=>{
  const gains=[];
  let bonusMap={};
  habits.forEach(h=>{
    const stats=h.weeklyBonus?.stats||[];
    const target=h.weeklyTarget||5;
    const cnt=countWeekChecks(checkedHabits,h.id);
    if(cnt>=target&&stats.length>0){
      stats.forEach(stat=>{
        if(!longStats[stat])return;
        gains.push({label:h.label,icon:h.icon,delta:1,stat});
        bonusMap[stat]=(bonusMap[stat]||0)+1;
      });
    }
  });
  const{longStats:newLong,extraFlowers}=applyLongWithOverflow(longStats,bonusMap);
  return{newLongStats:newLong,extraFlowers,gains};
};
const rwdTxt=(r={},ls=DEF_LONG,ss=DEF_SHORT)=>{
  const p=[`+${r.xp||0} 🌸`];
  Object.entries(r.long||{}).forEach(([k,v])=>p.push(`${ls[k]?.icon||""}长期+${v}`));
  Object.entries(r.short||{}).forEach(([k,v])=>p.push(`${ss[k]?.icon||""}今日+${v}`));
  return p.join(" · ");
};

  const reader=new FileReader();
  reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.player||!d.longStats)throw new Error("格式不正确");onSuccess(d);}catch(err){onError(err.message);}};
  reader.readAsText(file);
};

function SettingsLoginSection({user,setUser,setS,setShowSettings,pop}){
  const [mode,setMode]=useState("idle"); // idle|login|register
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const reset=()=>{setMode("idle");setEmail("");setPass("");setErr("");};

  const doGoogle=async()=>{
    setLoading(true);setErr("");
    try{
      const r=await window._fbSignInWithPopup(window._fbAuth,window._fbGoogleProvider);
      _fbUid=r.user.uid;setUser(r.user);pop("🎉 Google 登录成功！");reset();
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  const doEmail=async(isReg)=>{
    if(!email||!pass){setErr("请填写邮箱和密码");return;}
    setLoading(true);setErr("");
    try{
      const fn=isReg?window._fbCreateUser:window._fbSignInWithEmail;
      const r=await fn(window._fbAuth,email,pass);
      _fbUid=r.user.uid;setUser(r.user);pop(isReg?"🎉 注册成功！":"☁️ 已登录云端");reset();
    }catch(e){
      const msg=e.code==="auth/user-not-found"?"账号不存在":e.code==="auth/wrong-password"?"密码错误":e.code==="auth/email-already-in-use"?"邮箱已注册":e.code==="auth/invalid-email"?"邮箱格式不对":e.message;
      setErr(msg);
    }
    setLoading(false);
  };
  const doSignOut=async()=>{
    await window._fbSignOut(window._fbAuth);
    _fbUid=null;setUser(null);setS(null);setShowSettings(false);pop("👋 已退出登录");
  };

  return(
    <div style={{marginBottom:16,paddingBottom:16,borderBottom:"2px dashed #EDD9A3"}}>
      <div style={{fontSize:11,color:"#7A5C44",fontWeight:900,letterSpacing:.5,marginBottom:10}}>☁️ 账号与云同步</div>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,color:"#B09070",marginBottom:2}}>登录后数据自动云端同步，多设备共享 🌿</div>

          <span style={{fontSize:11,color:"#B09070"}}>低于此值时提醒</span>
        </div>
        {s.rescueList.map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1.5px dashed #EDD9A3"}}>
            <span style={{flex:1,fontSize:13}}>{item}</span>
            <button style={{background:"#FFF0EE",border:"2px solid #FFB3A8",color:"#C0392B",borderRadius:12,padding:"7px 9px",fontSize:12,cursor:"pointer"}} onClick={()=>{const nl=[...s.rescueList];nl.splice(i,1);save({...s,rescueList:nl});pop("🗑️ 已删除");}}>🗑</button>
          </div>
        ))}
        <RescueAdd onAdd={txt=>{if(txt.trim()){save({...s,rescueList:[...s.rescueList,txt.trim()]});pop("✅ 已添加");}}}/>
      </div>}
    </div>
  );
}

            使用 Google 账号登录
          </button>
          <button disabled={loading} onClick={()=>setMode("email")} style={{width:"100%",background:"linear-gradient(135deg,#7BC67E,#5BAF5F)",border:"none",borderRadius:16,padding:"14px",fontSize:15,fontWeight:800,color:"#fff",cursor:"pointer",boxShadow:"0 4px 16px rgba(91,175,95,.4)"}}>

          <input style={{width:"100%",background:"#FFFDF5",border:"2px solid #EDD9A3",borderRadius:12,padding:"12px 14px",fontSize:14,marginBottom:12,fontFamily:"inherit",color:"#3D2B1F"}} type="password" placeholder="密码（6位以上）" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doEmail()}/>

// ─── app ─────────────────────────────────────────────────
function App(){
  const [user,        setUser]         = useState(undefined); // undefined=loading, null=logged out, obj=logged in
  const [s,           setS]           = useState(null);
  const [tab,         setTab]         = useState("home");
  const [toast,       setToast]       = useState(null);
  const [modal,       setModal]       = useState(null);
  const [drawn,       setDrawn]       = useState(null);
  const [qForm,       setQForm]       = useState(null);
  const [evForm,      setEvForm]      = useState(null);
  const [habEdit,     setHabEdit]     = useState(null);
  const [letterD,     setLetterD]     = useState("");
  const [newBadge,    setNewBadge]    = useState(null);
  const [showSettings,setShowSettings]= useState(false);
  const [editingMotto,setEditingMotto]= useState(false);
  const [mottoD,      setMottoD]      = useState("");
  const [showWeeklyResult,setShowWeeklyResult]=useState(false);
  const [showFirework,    setShowFirework]    = useState(false);
  const popT     = useRef(null);
  const importRef= useRef(null);

  // Firebase auth state listener
  useEffect(()=>{
    const waitForFb = () => {
      if(window._fbOnAuthStateChanged&&window._fbAuth){
        window._fbOnAuthStateChanged(window._fbAuth, async (fbUser)=>{
          if(fbUser){
            _fbUid = fbUser.uid;
            setUser(fbUser);
          } else {
            _fbUid = null;
            setUser(null);
          }
        });
      } else {
        // Firebase not loaded yet - use localStorage only
        setUser(null);
      }
    };
    if(window._fbAuth) waitForFb();
    else window.addEventListener("firebase-ready", waitForFb, {once:true});
    // Timeout fallback: if Firebase never loads, just go local
    const t = setTimeout(()=>{ if(user===undefined) setUser(null); }, 3000);
    return ()=>clearTimeout(t);
  },[]);

  // Load data when user state is known
  useEffect(()=>{
    if(user===undefined) return; // still loading
    const initData = async () => {
    const today=todayKey();
    let d = null;
    let fromCloud = false;
    // Cloud-first: if logged in, always pull from Firestore and overwrite local
    if(user && user.uid){
      d = await fbLoad(user.uid);
      if(d){ lsSet(d); fromCloud = true; }
    }
    if(!d) d=dbGet();
    if(!d){const ns={...INIT,lastDate:today,lastResetDate:today};dbSet(ns);setS(ns);return;}
    if(!Array.isArray(d.habits))      d.habits=DEF_HABITS;
    if(!d.checkedHabits)              d.checkedHabits={};
    if(!d.recurringQuests)            d.recurringQuests=INIT.recurringQuests;
    if(!d.rescueList)                 d.rescueList=DEF_RESCUE;
    else{const existing=new Set(d.rescueList);const added=DEF_RESCUE.filter(x=>!existing.has(x));if(added.length)d.rescueList=[...d.rescueList,...added];}
    if(d.rescueThreshold===undefined) d.rescueThreshold=60;
    if(!d.bigEvents)                  d.bigEvents=[];
    if(!d.badges)                     d.badges=[];
    if(!d.dayColors)                  d.dayColors={};
    if(!d.daySummaries)               d.daySummaries={};
    if(!d.motto)                      d.motto="生活是一场冒险，每天都是新的探索 🌿";
    if(!d.eventTags)                  d.eventTags=["担心","开心","感恩","反思","突破"];
    if(!d.lastWeeklySettleDate)       d.lastWeeklySettleDate="";
    if(d.pendingWeeklyResult===undefined) d.pendingWeeklyResult=null;
    // Migrate longStats: add growth if missing
    if(!d.longStats.growth)           d.longStats={...d.longStats,growth:{label:"成长",icon:"📚",value:60,color:"#8B5CF6"}};
    // Migrate habits: ensure weeklyBonus.stats array + weeklyTarget
    d.habits=d.habits.map(h=>{
      if(h.longBonus!==undefined&&h.weeklyBonus===undefined){
        const lb=h.longBonus||{};
        const firstStat=Object.keys(lb)[0]||"";
        h={...h,weeklyBonus:{stats:firstStat?[firstStat]:[]},weeklyTarget:5};
        delete h.longBonus;
      }
      return migrateWeeklyBonus(h);
    });
    // Add focus habit if missing
    if(!d.habits.find(h=>h.id==="focus")){
      d.habits=[...d.habits,{id:"focus",label:"专注",icon:"🎯",weeklyBonus:{stats:["growth"]},weeklyTarget:4,shortBonus:{mood:5}}];
    }

    const h=nowHour();
    const resetDay=h>=5?today:(()=>{const dt=new Date();dt.setDate(dt.getDate()-1);return dt.toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});})();
    if(d.lastResetDate!==resetDay){
      const snap={date:d.lastDate||d.lastResetDate,long:d.longStats,short:d.shortStats,level:d.player.level,letter:d.letter};
      const hist=[...(d.history||[]),snap].slice(-60);
      const rs={};Object.keys(d.shortStats).forEach(k=>rs[k]={...d.shortStats[k],value:80});
      d={...d,shortStats:rs,history:hist,lastDate:today,lastResetDate:resetDay};
    } else if(d.lastDate!==today){d={...d,lastDate:today};}

    // Check weekly settlement: trigger if it's Saturday (day 6) and not yet settled this week
    const now=new Date();
    const curWeekKey=getWeekKey(now);
    if(now.getDay()===6&&d.lastWeeklySettleDate!==curWeekKey){
      const{newLongStats,extraFlowers,gains}=runWeeklySettle(d.habits,d.checkedHabits,d.longStats);
      d={...d,longStats:newLongStats,player:{...d.player,xp:d.player.xp+extraFlowers},
         lastWeeklySettleDate:curWeekKey,
         pendingWeeklyResult:{gains,flowers:extraFlowers}};
    }

    dbSet(d);setS(d);
    // If data came from cloud, show a brief toast (deferred so pop() is available)
    if(fromCloud){ setTimeout(()=>pop("☁️ 已从云端同步最新数据"),300); }
    // If logged in but no cloud data yet (first login on this account), upload local data
    if(user && user.uid && !fromCloud){ fbSave(user.uid, d); }
    }; // end initData
    initData();
  },[user]);

  const save=useCallback(ns=>{setS(ns);dbSet(ns);fbSave(_fbUid,ns);},[]);
  const pop=msg=>{setToast(msg);clearTimeout(popT.current);popT.current=setTimeout(()=>setToast(null),2600);};

  // Auto-show weekly result popup once
  useEffect(()=>{
    if(s&&s.pendingWeeklyResult){setShowWeeklyResult(true);}
  },[s?.pendingWeeklyResult]);

  const lvUp=(xp,lv,xpN,badges)=>{
    let nb=[...(badges||[])],latest=null;
    while(xp>=xpN){lv++;xp-=xpN;xpN=100;const badge=grantBadge(lv,nb);nb.push(badge);latest=badge;}
    return{xp,lv,xpN:100,newBadges:nb,latestBadge:latest};
  };

  const completeQuest=id=>{
    const all=[...s.mainQuests,...s.sideQuests];const q=all.find(x=>x.id===id);if(!q||q.done)return;
    const r=q.reward||{};
    let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+(r.xp||0),s.player.level,s.player.xpNext,s.badges);
    if(s.player.level===lv)pop(`✅ 完成！${rwdTxt(r,s.longStats,s.shortStats)}`);
    else{pop(`🎉 升级 Lv.${lv}！获得徽章！`);if(latestBadge)setNewBadge(latestBadge);}
    save({...s,player:{...s.player,xp,level:lv,xpNext:xpN},badges:newBadges,
      longStats:applyB(s.longStats,r.long||{}),shortStats:applyB(s.shortStats,r.short||{}),
      mainQuests:s.mainQuests.map(q2=>q2.id===id?{...q2,done:true}:q2),
      sideQuests:s.sideQuests.map(q2=>q2.id===id?{...q2,done:true}:q2),
    });
  };
  const deleteQuest=id=>{
    save({...s,mainQuests:s.mainQuests.filter(q=>q.id!==id),sideQuests:s.sideQuests.filter(q=>q.id!==id),recurringQuests:s.recurringQuests.filter(q=>q.id!==id)});
    pop("🗑️ 已删除");
  };
  const completeRecurring=id=>{
    const q=s.recurringQuests.find(x=>x.id===id);if(!q||!canDoR(q))return;
    const r=q.reward||{};
    let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+(r.xp||0),s.player.level,s.player.xpNext,s.badges);
    if(s.player.level===lv)pop(`✅ ${q.title} 完成！`);
    else{pop(`🎉 升级 Lv.${lv}！获得徽章！`);if(latestBadge)setNewBadge(latestBadge);}
    save({...s,player:{...s.player,xp,level:lv,xpNext:xpN},badges:newBadges,
      longStats:applyB(s.longStats,r.long||{}),shortStats:applyB(s.shortStats,r.short||{}),
      recurringQuests:s.recurringQuests.map(q2=>q2.id===id?{...q2,lastDone:new Date().toISOString()}:q2),
    });
  };
  const toggleHabit=hid=>{
    const today=todayKey(),th=s.checkedHabits[today]||{},was=!!th[hid];
    const h=s.habits.find(x=>x.id===hid);if(!h)return;
    let ns={...s,checkedHabits:{...s.checkedHabits,[today]:{...th,[hid]:!was}}};
    if(!was){
      // Apply short stats (capped at 100)
      const sb=h.shortBonus||{};
      const newShort={};
      Object.keys(ns.shortStats).forEach(k=>{
        const add=sb[k]||0;
        newShort[k]={...ns.shortStats[k],value:Math.min(100,ns.shortStats[k].value+add)};
      });
      ns.shortStats=newShort;
      // +1 flower (xp)
      ns.player={...ns.player,xp:ns.player.xp+1};
      // 检测今日全部完成
      const newTh={...th,[hid]:true};
      const allDone=s.habits.length>0&&s.habits.every(x=>newTh[x.id]);
      if(allDone){
        ns.player={...ns.player,xp:ns.player.xp+10}; // 已+1，再+10共+11
        setTimeout(()=>setShowFirework(true),100);
        pop(`🎉 今日全部完成！🌸+11`);
      } else {
        pop(`${h.icon} ${h.label} 完成！🌸+1`);
      }
    } else {
      // Undo short stats
      const sb=h.shortBonus||{};
      const newShort={};
      Object.keys(ns.shortStats).forEach(k=>{
        const sub=sb[k]||0;
        newShort[k]={...ns.shortStats[k],value:Math.max(0,ns.shortStats[k].value-sub)};
      });
      ns.shortStats=newShort;
      // -1 flower
      ns.player={...ns.player,xp:Math.max(0,ns.player.xp-1)};
    }
    save(ns);
  };
  const saveHabit=draft=>{
    if(!draft.label.trim())return;
    const exists=s.habits.find(h=>h.id===draft.id);
    save({...s,habits:exists?s.habits.map(h=>h.id===draft.id?draft:h):[...s.habits,{...draft,id:"h_"+Date.now()}]});
    setModal(null);setHabEdit(null);pop("✏️ 已保存");
  };
  const deleteHabit=id=>{save({...s,habits:s.habits.filter(h=>h.id!==id)});setModal(null);setHabEdit(null);pop("🗑️ 已删除");};
  const saveQuest=()=>{
    if(!qForm.title.trim())return;
    const reward={xp:Number(qForm.xp)||10,long:{...qForm.long},short:{...qForm.short}};
    Object.keys(reward.long).forEach(k=>{if(!reward.long[k])delete reward.long[k];});
    Object.keys(reward.short).forEach(k=>{if(!reward.short[k])delete reward.short[k];});
    if(qForm.type==="recurring"){
      save({...s,recurringQuests:[...s.recurringQuests,{id:"r_"+Date.now(),title:qForm.title,desc:qForm.desc,period:qForm.period||"weekly",reward,lastDone:""}]});
    }else{
      const q={id:Date.now(),title:qForm.title,desc:qForm.desc,reward,done:false};
      save({...s,mainQuests:qForm.type==="main"?[...s.mainQuests,q]:s.mainQuests,sideQuests:qForm.type==="side"?[...s.sideQuests,q]:s.sideQuests});
    }
    setModal(null);setQForm(null);pop("📜 任务已接取");
  };
  const saveBigEvent=()=>{
    if(!evForm.text.trim())return;
    const evXp=Number(evForm.xp)||0;
    const isEdit=!!evForm.id;
    const lc={},sc={};
    Object.keys(s.longStats).forEach(k=>{if(evForm.changes[k])lc[k]=evForm.changes[k];});
    Object.keys(s.shortStats).forEach(k=>{if(evForm.changes[k])sc[k]=evForm.changes[k];});

    if(isEdit){
      // editing: just update text/tag/xp/changes, don't re-apply stat bonuses
      const updatedEvents=s.bigEvents.map(ev=>ev.id===evForm.id
        ?{...ev,text:evForm.text,xp:evXp,statChanges:evForm.changes,tag:evForm.tag||""}
        :ev);
      save({...s,bigEvents:updatedEvents});
      pop("✏️ 大事已更新");
    } else {
      const ev={id:Date.now(),date:todayKey(),text:evForm.text,xp:evXp,statChanges:evForm.changes,tag:evForm.tag||""};
      const{longStats:newLong,extraFlowers}=applyLongWithOverflow(s.longStats,lc);
      let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+evXp+extraFlowers,s.player.level,s.player.xpNext,s.badges);
      if(s.player.level===lv)pop("📝 大事已记录");
      else{pop(`🎉 升级 Lv.${lv}！获得徽章！`);if(latestBadge)setNewBadge(latestBadge);}
      save({...s,player:{...s.player,xp,level:lv,xpNext:xpN},badges:newBadges,bigEvents:[...s.bigEvents,ev].slice(-2000),longStats:newLong,shortStats:applyB(s.shortStats,sc)});
    }
    setModal(null);setEvForm(null);
  };
  const handleImport=d=>{
    const merged={...INIT,...d,lastDate:todayKey(),lastResetDate:todayKey(),checkedHabits:d.checkedHabits||{},badges:d.badges||[],dayColors:d.dayColors||{},daySummaries:d.daySummaries||{},motto:d.motto||INIT.motto,eventTags:d.eventTags||INIT.eventTags,lastWeeklySettleDate:d.lastWeeklySettleDate||"",pendingWeeklyResult:null};
    save(merged);pop("✅ 数据导入成功！");setShowSettings(false);
  };

  if(!s)return(
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#AEE6F8,#D4F0FF)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{animation:"float 2s ease-in-out infinite",fontSize:48}}>🌿</div>
      <div style={{color:"#5BAF5F",fontSize:14,fontWeight:700,letterSpacing:2}}>小岛加载中…</div>
    </div>
  );

  const today=todayKey(),th=s.checkedHabits[today]||{},doneCnt=s.habits.filter(h=>th[h.id]).length;
  const xpPct=Math.min(100,(s.player.xp/s.player.xpNext)*100);
  const lowMood=s.shortStats.mood?.value<s.rescueThreshold,lowEnergy=s.shortStats.energy?.value<s.rescueThreshold;
  const showAlert=lowMood||lowEnergy;
  const badges=s.badges||[];

  const TABS=[["home","🌱","主页"],["quests","🌳","任务"],["habits","🌻","打卡"],["log","🍃","记录"]];

  return(
    <div style={{fontFamily:"'Nunito','Noto Sans SC','PingFang SC',sans-serif",background:"#E8F5E9",minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"#3D2B1F"}}>

// luminance-based text color
const textOnBg=hex=>{
  if(!hex)return"#7A5C44";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>158?"#3D2B1F":"#fff";
};

function DayEntry({h,isToday,bg,summary,onPickColor,onSaveSummary}){
  const [pickerOpen,setPickerOpen]=useState(false);
  const [editingSum,setEditingSum]=useState(false);
  const [sumDraft,setSumDraft]=useState(summary||"");
  const tc=textOnBg(bg);
  const chipLongBg  = bg?tc+"18":"#F0FFF0";
  const chipLongBd  = bg?tc+"44":"#A8D8A8";
  const chipLongTx  = bg?tc:"#3A7D3E";
  const chipShortBg = bg?tc+"18":"#FFF8E8";
  const chipShortBd = bg?tc+"44":"#EDD9A3";
  const chipShortTx = bg?tc:"#A06000";

  return(
    <div style={{
      borderRadius:18,
      background:bg||"#FAFFF8",
      border:`2.5px solid ${bg||"#D4EED4"}`,
      marginBottom:10,
      overflow:"hidden",
      boxShadow:bg?`0 4px 16px ${bg}66`:"0 2px 8px rgba(90,60,30,.07)",
      transition:"background .3s,border .3s",
    }}>
      {/* ── row 1: date + color dot ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          {isToday&&<span style={{fontSize:10,fontWeight:900,background:"rgba(123,198,126,.25)",color:bg?tc:"#3A7D3E",borderRadius:10,padding:"2px 7px",border:`1px solid ${bg?tc+"44":"#A8D8A8"}`}}>今天</span>}
          <span style={{fontSize:11,fontWeight:900,color:bg?tc:"#7A5C44"}}>{h.date} · Lv.{h.level}</span>
        </div>
        <button
          onClick={()=>setPickerOpen(o=>!o)}
          title="选择色块颜色"
          style={{
            width:26,height:26,borderRadius:"50%",
            background:bg||"#E8F5E8",
            border:`2.5px solid ${bg?tc+"66":"#A8D8A8"}`,
            cursor:"pointer",flexShrink:0,
            boxShadow:pickerOpen?`0 0 0 3px ${bg||"#7BC67E"}55`:"none",
            transition:"box-shadow .2s",
          }}
        />
      </div>

      {/* ── color palette (10×10) ── */}
      {pickerOpen&&(
        <div style={{padding:"10px 14px 4px",animation:"fadeSlideUp .2s ease"}}>
          <div style={{fontSize:10,fontWeight:700,color:bg?tc+"aa":"#B09070",marginBottom:8}}>🎨 选择今天的颜色</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:4,marginBottom:8}}>
            {DAY_PALETTE.map(c=>(
              <button key={c} onClick={()=>{onPickColor(c);setPickerOpen(false);}}
                style={{
                  width:"100%",aspectRatio:"1",borderRadius:6,
                  background:c,
                  border:`2px solid ${bg===c?"#3D2B1F":"rgba(0,0,0,.08)"}`,
                  cursor:"pointer",outline:"none",
                }}
              />
            ))}
          </div>
          {bg&&(
            <button onClick={()=>{onPickColor("");setPickerOpen(false);}}
              style={{fontSize:11,color:tc,background:"none",border:"none",cursor:"pointer",fontWeight:700,textDecoration:"underline",opacity:.7}}>
              清除颜色
            </button>
          )}
        </div>
      )}

      {/* ── row 2: one-line summary ── */}
      <div style={{padding:"8px 14px 0"}}>
        {editingSum
          ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input
              autoFocus
              style={{flex:1,background:"rgba(255,255,255,.6)",border:`1.5px solid ${bg?tc+"55":"#C8E8C8"}`,borderRadius:10,padding:"7px 10px",fontSize:13,color:bg?tc:"#3D2B1F",outline:"none",fontFamily:"inherit"}}
              value={sumDraft}
              placeholder="用一句话描述今天…"
              onChange={e=>setSumDraft(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){onSaveSummary(sumDraft);setEditingSum(false);}if(e.key==="Escape")setEditingSum(false);}}
              maxLength={60}
            />
            <button onClick={()=>{onSaveSummary(sumDraft);setEditingSum(false);}}
              style={{background:"rgba(255,255,255,.5)",border:`1.5px solid ${bg?tc+"55":"#A8D8A8"}`,borderRadius:10,padding:"7px 10px",fontSize:12,fontWeight:800,color:bg?tc:"#3A7D3E",cursor:"pointer"}}>
              ✓
            </button>
          </div>
          :<div onClick={()=>{setSumDraft(summary||"");setEditingSum(true);}} style={{
            fontSize:13,fontWeight:700,
            color:bg?tc:(summary?"#3D2B1F":"#C8A880"),
            fontStyle:summary?"normal":"italic",

          <span key={k} style={{background:chipShortBg,border:`1.5px solid ${chipShortBd}`,color:chipShortTx,borderRadius:20,padding:"4px 10px",fontSize:12,fontWeight:700}}>
            {st.icon}{st.value}
          </span>
        ))}
      </div>
    </div>
  );
}

function HistoryCard({history,dayColors,daySummaries,today,todaySnap,onPickColor,onSaveSummary}){
  const [showAll,setShowAll]=useState(false);
  const pastReversed=[...history].reverse();
  // Show today + 1 past by default (2 total), rest folded
  const entriesToShow=[
    {...todaySnap,isToday:true},
    ...(showAll?pastReversed:pastReversed.slice(0,1)),
  ];
  const extra=pastReversed.length-1;

  return(
    <div style={{background:"#FFFDF5",borderRadius:22,padding:"16px 16px",marginBottom:12,boxShadow:"0 4px 20px rgba(90,60,30,.08)",border:"2px solid #EDD9A3"}}>

            {showAll?`收起 ▲`:`更多 ${extra} 天 ▼`}

          key={h.date+i}

          isToday={!!h.isToday}

          onPickColor={color=>onPickColor(h.date,color)}
          onSaveSummary={text=>onSaveSummary(h.date,text)}
        />
      ))}
    </div>
  );
}

// ─── tag color map (cycles through AC-palette colors) ────
const TAG_COLORS = [
  {bg:"#FFF0F0",border:"#FFB3B3",text:"#C0392B"},  // red – 担心
  {bg:"#FFF8E8",border:"#FFD166",text:"#A06000"},  // yellow – 开心
  {bg:"#F0FFF0",border:"#7BC67E",text:"#2E7D32"},  // green – 感恩
  {bg:"#EEF4FF",border:"#7BAAE0",text:"#2855A0"},  // blue – 反思
  {bg:"#F8E8FF",border:"#C9A8E8",text:"#6A3AAA"},  // purple – 突破
  {bg:"#FFF4EE",border:"#FFBB88",text:"#9A4A00"},  // orange
  {bg:"#F0FFFE",border:"#7DD4F0",text:"#1A6A8A"},  // teal
  {bg:"#FFF0FA",border:"#FFB3E8",text:"#9A2070"},  // pink
];
const getTagColor=(tag,tags)=>{
  const i=tags.indexOf(tag);
  return TAG_COLORS[i%TAG_COLORS.length]||TAG_COLORS[0];
};

function BigEventsCard({events,eventTags,longStats,shortStats,onAdd,onEdit,onDeleteTag,onAddTag}){
  const [activeTag,setActiveTag]=useState("all");
  const [addingTag,setAddingTag]=useState(false);
  const [newTagInput,setNewTagInput]=useState("");
  const [showAll,setShowAll]=useState(false);

  const filtered=activeTag==="all"?[...events].reverse():[...events].reverse().filter(ev=>ev.tag===activeTag);
  const toShow=showAll?filtered:filtered.slice(0,2);
  const extra=filtered.length-2;

  const submitNewTag=()=>{
    const t=newTagInput.trim();
    if(!t)return;
    onAddTag(t);
    setNewTagInput("");
    setAddingTag(false);
    setActiveTag(t);
  };

  return(
    <div style={{background:"#FFFDF5",borderRadius:22,padding:"16px 16px",marginBottom:12,boxShadow:"0 4px 20px rgba(90,60,30,.08)",border:"2px solid #EDD9A3"}}>
      {/* header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#7A5C44",fontWeight:900,letterSpacing:.5}}>📝 大事记录</div>
        <button style={S.plusBtn} onClick={onAdd}>＋ 记录</button>
      </div>

      {/* tag filter row */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        <button onClick={()=>setActiveTag("all")}
          style={{fontSize:11,fontWeight:activeTag==="all"?900:600,borderRadius:18,padding:"4px 12px",border:`2px solid ${activeTag==="all"?"#5BAF5F":"#D4EED4"}`,background:activeTag==="all"?"#5BAF5F":"#F8FFF8",color:activeTag==="all"?"#fff":"#5BAF5F",cursor:"pointer",transition:"all .15s"}}>
          全部 {events.length}
        </button>
        {eventTags.map(t=>{
          const tc=getTagColor(t,eventTags);
          const count=events.filter(ev=>ev.tag===t).length;
          const active=activeTag===t;
          return(
            <div key={t} style={{display:"flex",alignItems:"center",gap:0}}>
              <button onClick={()=>setActiveTag(active?"all":t)}
                style={{fontSize:11,fontWeight:active?900:600,borderRadius:"18px 0 0 18px",padding:"4px 10px",border:`2px solid ${tc.border}`,borderRight:"none",background:active?tc.border:tc.bg,color:tc.text,cursor:"pointer",transition:"all .15s"}}>
                {t} {count>0&&<span style={{opacity:.7}}>{count}</span>}
              </button>
              <button onClick={()=>{if(activeTag===t)setActiveTag("all");onDeleteTag(t);}}
                style={{fontSize:10,borderRadius:"0 18px 18px 0",padding:"4px 7px",border:`2px solid ${tc.border}`,borderLeft:"1px solid rgba(0,0,0,.1)",background:active?tc.border:tc.bg,color:tc.text,cursor:"pointer",opacity:.6,lineHeight:1}}>✕</button>
            </div>
          );
        })}
        {addingTag
          ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
            <input autoFocus value={newTagInput} onChange={e=>setNewTagInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")submitNewTag();if(e.key==="Escape"){setAddingTag(false);setNewTagInput("");}}}
              maxLength={8} placeholder="标签名…"
              style={{width:68,background:"#FFFDF5",border:"2px solid #A8D8A8",borderRadius:10,padding:"4px 8px",fontSize:12,color:"#3D2B1F",outline:"none",fontFamily:"inherit"}}/>
            <button onClick={submitNewTag} style={{fontSize:12,fontWeight:800,color:"#3A7D3E",background:"#F0FFF0",border:"2px solid #7BC67E",borderRadius:10,padding:"4px 8px",cursor:"pointer"}}>✓</button>
            <button onClick={()=>{setAddingTag(false);setNewTagInput("");}} style={{fontSize:12,color:"#B09070",background:"none",border:"none",cursor:"pointer",padding:"4px"}}>✕</button>
          </div>
          :<button onClick={()=>setAddingTag(true)}
            style={{fontSize:11,color:"#7BC67E",background:"#F0FFF0",border:"2px dashed #A8D8A8",borderRadius:18,padding:"4px 10px",cursor:"pointer",fontWeight:700}}>＋ 标签</button>
        }
      </div>

      {/* events list */}
      {filtered.length===0&&<div style={{color:"#C8A880",fontSize:13,textAlign:"center",padding:"12px 0"}}>{activeTag==="all"?"记录下影响你状态的重要事件":`还没有「${activeTag}」类型的记录`}</div>}
      {toShow.map(ev=>{
        const tc=ev.tag?getTagColor(ev.tag,eventTags):null;
        return(
          <div key={ev.id} style={{padding:"12px 0",borderBottom:"1.5px dashed #EDD9A3"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span style={{fontSize:10,color:"#B09070",fontWeight:700}}>{ev.date}</span>
              {ev.tag&&tc&&<span style={{fontSize:10,fontWeight:800,background:tc.bg,border:`1.5px solid ${tc.border}`,color:tc.text,borderRadius:14,padding:"2px 8px"}}>{ev.tag}</span>}
              <button onClick={()=>onEdit(ev)} style={{marginLeft:"auto",background:"none",border:"none",fontSize:13,cursor:"pointer",opacity:.5,padding:"0 2px"}} title="编辑">✏️</button>
            </div>
            <div style={{fontSize:13,color:"#3D2B1F",lineHeight:1.65,marginBottom:6}}>{ev.text}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ev.xp>0&&<span style={{fontSize:11,fontWeight:700,background:"#F0FFF0",border:"1.5px solid #7BC67E",color:"#3A7D3E",borderRadius:20,padding:"3px 10px"}}>🌸+{ev.xp}</span>}
              {ev.statChanges&&Object.entries(ev.statChanges).map(([k,v])=>{
                const st=longStats[k]||shortStats[k]||{};
                return<span key={k} style={{fontSize:11,fontWeight:700,background:v>=0?"#F0FFF0":"#FFF0F0",border:`1.5px solid ${v>=0?"#7BC67E":"#FF7B6B"}`,color:v>=0?"#3A7D3E":"#C0392B",borderRadius:20,padding:"3px 10px"}}>{st.icon}{v>0?"+":""}{v}</span>;
              })}
            </div>
          </div>
        );
      })}
      {!showAll&&extra>0&&<button onClick={()=>setShowAll(true)} style={{width:"100%",marginTop:8,fontSize:11,fontWeight:800,color:"#5BAF5F",background:"#F0FFF0",border:"2px solid #A8D8A8",borderRadius:14,padding:"7px",cursor:"pointer"}}>展开更多 {extra} 条 ▼</button>}
      {showAll&&filtered.length>2&&<button onClick={()=>setShowAll(false)} style={{width:"100%",marginTop:8,fontSize:11,fontWeight:800,color:"#7A5C44",background:"#FFFDF5",border:"2px solid #EDD9A3",borderRadius:14,padding:"7px",cursor:"pointer"}}>收起 ▲</button>}
    </div>
  );
}

function BadgeCollection({badges}){
  const [filter,setFilter]=useState("all");
  const [selected,setSelected]=useState(null);
  const rarities=["all","common","rare","legend"];
  const rarityLabel={all:"全部",common:"普通",rare:"稀有",legend:"传说"};
  const filtered=filter==="all"?badges:badges.filter(b=>b.rarity===filter);
  const counts={all:badges.length,common:badges.filter(b=>b.rarity==="common").length,rare:badges.filter(b=>b.rarity==="rare").length,legend:badges.filter(b=>b.rarity==="legend").length};
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {rarities.map(r=>{
          const rc=r==="all"?null:RARITY_CFG[r];
          const active=filter===r;
          return<button key={r} onClick={()=>setFilter(r)} style={{border:`2px solid ${active?(rc?.border||"#7BC67E"):"#EDD9A3"}`,background:active?(rc?.bg||"#F0FFF0"):"#FFFDF5",color:active?(rc?.text||"#3A7D3E"):"#B09070",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:active?900:600,cursor:"pointer"}}>{rarityLabel[r]} {counts[r]}</button>;
        })}
      </div>
      {filtered.length===0&&<div style={{color:"#C8A880",fontSize:13,textAlign:"center",padding:"12px 0"}}>还没有{rarityLabel[filter]}徽章 🌱</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[...filtered].reverse().map(b=>{
          const rc=RARITY_CFG[b.rarity];
          return<div key={b.id} onClick={()=>setSelected(b)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",background:rc.bg,border:`2px solid ${rc.border}`,borderRadius:16,padding:"10px 4px",boxShadow:`0 3px 10px ${rc.glow}`}}>
            <BadgeSVG name={b.name} rarity={b.rarity} size={44}/>
            <div style={{fontSize:9,color:rc.text,textAlign:"center",lineHeight:1.3,fontWeight:800}}>{b.name}</div>
          </div>;
        })}
      </div>
      {selected&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,40,20,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelected(null)}>
          <div style={{background:"#FFFDF5",borderRadius:24,padding:"28px 24px",maxWidth:280,width:"90%",textAlign:"center",border:`3px solid ${RARITY_CFG[selected.rarity].border}`}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><BadgeSVG name={selected.name} rarity={selected.rarity} size={90}/></div>
            <div style={{fontSize:18,fontWeight:900,color:"#3D2B1F",marginBottom:6}}>{selected.name}</div>
            <div style={{fontSize:12,color:RARITY_CFG[selected.rarity].text,background:RARITY_CFG[selected.rarity].bg,borderRadius:20,padding:"4px 14px",display:"inline-block",marginBottom:6,fontWeight:800,border:`1.5px solid ${RARITY_CFG[selected.rarity].border}`}}>
              {RARITY_CFG[selected.rarity].star} {RARITY_CFG[selected.rarity].label}
            </div>
            <div style={{fontSize:11,color:"#B09070",marginBottom:18}}>获得于 Lv.{selected.level} · {selected.date}</div>
            <button style={{background:"#F0FFF0",border:"2px solid #7BC67E",color:"#3A7D3E",borderRadius:14,padding:"9px 28px",fontSize:13,fontWeight:800,cursor:"pointer"}} onClick={()=>setSelected(null)}>关闭 🍃</button>

  );
}

// ─── firework ────────────────────────────────────────────
const FW_COLORS=["#a7c957","#7fa832","#FFD166","#FF9A5C","#70B8E0","#FFB3C6","#8B5CF6","#fff"];
function Firework({onDone}){
  const particles=useMemo(()=>{
    const rockets=[
      {x:20,color:"#a7c957"},{x:50,color:"#FFD166"},{x:80,color:"#FF9A5C"},
      {x:35,color:"#70B8E0"},{x:65,color:"#8B5CF6"},
    ];
    return rockets.map((r,ri)=>({
      ...r,
      delay:ri*0.15,
      bursts:Array.from({length:16},(_,i)=>{
        const angle=(i/16)*Math.PI*2;
        const dist=55+Math.random()*40;
        return{
          tx:Math.round(Math.cos(angle)*dist),
          ty:Math.round(Math.sin(angle)*dist),
          color:FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)],
          size:4+Math.random()*4,
          delay:r.delay+0.55+Math.random()*0.1,
        };
      }),
    }));
  },[]);

  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,pointerEvents:"none",overflow:"hidden"}} onClick={onDone}>
      {/* 半透明遮罩 */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",animation:"fwFade 3s ease forwards"}}/>
      {/* 中央提示 */}
      <div style={{position:"absolute",top:"38%",left:"50%",transform:"translateX(-50%)",textAlign:"center",animation:"fwFade 3s ease forwards"}}>
        <div style={{fontSize:52,lineHeight:1,marginBottom:8,animation:"badgePop .4s cubic-bezier(.34,1.56,.64,1)"}}>🎉</div>
        <div style={{fontSize:22,fontWeight:900,color:"#fff",textShadow:"0 2px 12px rgba(0,0,0,.4)",letterSpacing:.5}}>今日全部完成！</div>
        <div style={{fontSize:16,color:"#FFD166",fontWeight:800,marginTop:6,textShadow:"0 1px 6px rgba(0,0,0,.4)"}}>🌸 +10 花</div>
      </div>
      {/* 烟花 */}
      {particles.map((r,ri)=>(
        <div key={ri} style={{position:"absolute",bottom:0,left:`${r.x}%`}}>
          {/* 升空轨迹 */}
          <div style={{
            width:4,height:18,borderRadius:2,background:r.color,
            animation:`fwShoot .7s ${r.delay}s cubic-bezier(.2,.8,.4,1) forwards`,
            opacity:0,transformOrigin:"bottom center",
          }}/>
          {/* 爆炸粒子 */}
          {r.bursts.map((p,pi)=>(
            <div key={pi} style={{
              position:"absolute",bottom:220,left:2,
              width:p.size,height:p.size,borderRadius:"50%",background:p.color,
              "--tx":`${p.tx}px`,"--ty":`${p.ty}px`,
              animation:`fwBurst .8s ${p.delay}s cubic-bezier(.2,.6,.4,1) forwards`,
              opacity:0,
            }}/>
          ))}
        </div>
      ))}
    </div>
  );
}

          <input type="number" min="0" max="99" style={S.nudgeInp} value={d.shortBonus[k]||""} placeholder="0" onChange={e=>upShort(k,Number(e.target.value))}/></div>
      ))}
    </div>
    <button style={S.cfmBtn} onClick={()=>onSave(d)}>保存</button>
    {onDelete&&<button style={{...S.cfmBtn,marginTop:8,background:"#FFF0EE",color:"#C0392B",boxShadow:"none",border:"2px solid #FFB3A8"}} onClick={onDelete}>删除此打卡项</button>}
  </>;
}
function RescueAdd({onAdd}){
  const [v,setV]=useState("");
  return<div style={{display:"flex",gap:8,marginTop:8}}>
    <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="添加新建议…" value={v} onChange={e=>setV(e.target.value)}
      onKeyDown={e=>{if(e.key==="Enter"){onAdd(v);setV("");}}}/>
    <button style={{...S.dBtn,padding:"10px 14px",flexShrink:0}} onClick={()=>{onAdd(v);setV("");}}>添加</button>
  </div>;
}

// ─── styles ───────────────────────────────────────────────
const S={

  xBtn:    {background:"#FFF0EE",border:"2px solid #FFB3A8",color:"#C0392B",borderRadius:12,padding:"7px 9px",fontSize:12,cursor:"pointer"},
  editTxtBtn:{background:"#F0FFF0",border:"2px solid #7BC67E",color:"#3A7D3E",borderRadius:12,padding:"4px 12px",fontSize:11,fontWeight:800,cursor:"pointer"},
  cfmBtn:  {width:"100%",background:"linear-gradient(135deg,#7BC67E,#5BAF5F)",border:"none",color:"#fff",borderRadius:16,padding:"15px",fontSize:15,fontWeight:900,boxShadow:"0 6px 20px rgba(91,175,95,.4)",cursor:"pointer"},
  overlay: {position:"fixed",inset:0,background:"rgba(30,20,10,.45)",zIndex:100,display:"flex",alignItems:"flex-end"},
  drawer:  {background:"#FFFDF5",borderRadius:"24px 24px 0 0",padding:"8px 20px max(44px,env(safe-area-inset-bottom,44px))",width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"88vh",overflowY:"auto",border:"2px solid #EDD9A3",borderBottom:"none"},
  handle:  {width:40,height:5,background:"#EDD9A3",borderRadius:3,margin:"0 auto 18px"},
  dH:      {fontSize:17,fontWeight:900,marginBottom:14,color:"#3D2B1F"},

  tog:     {display:"flex",gap:8,marginBottom:8},
  tBtn:    {flex:1,background:"#FFFDF5",border:"2px solid #EDD9A3",color:"#B09070",borderRadius:14,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer"},
  tOn:     {background:"#F0FFF0",border:"2px solid #7BC67E",color:"#3A7D3E",fontWeight:900},

  bonusItem:{display:"flex",alignItems:"center",gap:5,background:"#F8FFF8",borderRadius:12,padding:"7px 10px",border:"1.5px solid #D4EED4"},
  nudgeInp:{width:46,background:"#FFFDF5",border:"2px solid #EDD9A3",borderRadius:8,color:"#3D2B1F",padding:"4px 6px",fontSize:14,textAlign:"center"},
  settingSection:{marginBottom:16,paddingBottom:16,borderBottom:"2px dashed #EDD9A3"},
  settingRow:{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1.5px dashed #EDD9A3"},
};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  // 把 SW 代码写成字符串，通过 Blob URL 注册，无需独立 sw.js 文件
  const CACHE = 'island-v1';
  const ASSETS = [
    'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js',
    'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap',
  ];

  const swCode = `
const CACHE_NAME = '${CACHE}';
const ASSETS = ${JSON.stringify(ASSETS)};

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // 只缓存 GET 请求，跳过 Firebase API 调用
  if(e.request.method !== 'GET') return;
  const url = e.request.url;
  if(url.includes('firestore.googleapis.com') || url.includes('identitytoolkit') || url.includes('securetoken')) return;

  e.respondWith(
    caches.match(e.request).then(cached => {
      if(cached){
        // 缓存命中：直接返回，同时后台更新
        fetch(e.request).then(res => {
          if(res && res.status === 200){
            caches.open(CACHE_NAME).then(c => c.put(e.request, res));
          }
        }).catch(()=>{});
        return cached;
      }
      // 未缓存：走网络，成功后存入缓存
      return fetch(e.request).then(res => {
        if(res && res.status === 200 && e.request.url.startsWith('https')){
          const clone = res.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return res;
      });
    })
  );
});
`;

  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'})
    .then(reg => console.log('SW registered, scope:', reg.scope))
    .catch(err => console.warn('SW registration failed:', err));
}
</script>
