  <!-- iOS Home Screen Icon: AC leaf logo on white background -->
  <script>
  (function(){
    var c=document.createElement('canvas');
    c.width=c.height=180;
    var g=c.getContext('2d');
    // rounded white bg
    g.beginPath();
    g.moveTo(36,0);g.lineTo(144,0);g.arcTo(180,0,180,36,36);
    g.lineTo(180,144);g.arcTo(180,180,144,180,36);
    g.lineTo(36,180);g.arcTo(0,180,0,144,36);
    g.lineTo(0,36);g.arcTo(0,0,36,0,36);
    g.closePath();g.fillStyle='#fff';g.fill();g.clip();

    var G='#29B851';

    // ── main leaf body ─────────────────────────────────────
    // The AC leaf is a big rounded asymmetric blob, flat-ish on right, 
    // bulging left, with the "dent" notch at top-right where stem meets body
    g.beginPath();
    g.moveTo(100,22);                              // top, just left of stem notch
    g.bezierCurveTo(68,16,30,30,16,68);            // upper-left curve
    g.bezierCurveTo(4,98,6,130,20,152);            // left side down
    g.bezierCurveTo(36,174,64,184,92,178);         // bottom-left
    g.bezierCurveTo(116,174,138,162,148,146);      // bottom-right (above hole)
    // curl around the hole — go up-right then back
    g.bezierCurveTo(160,128,162,108,154,90);       // right side
    g.bezierCurveTo(148,74,138,58,128,44);         // upper right
    g.bezierCurveTo(120,32,112,24,100,22);         // back to top
    g.closePath();
    g.fillStyle=G;g.fill();

    // ── stem (upper right, tapered triangle pointing up-right) ──
    g.beginPath();
    g.moveTo(108,26);   // root on leaf
    g.lineTo(136,-4);   // tip
    g.lineTo(150,8);    // right edge of stem
    g.lineTo(128,38);   // back down to leaf
    g.closePath();
    g.fillStyle=G;g.fill();

    // ── white notch between stem and leaf body ──
    g.beginPath();
    g.moveTo(112,28);
    g.bezierCurveTo(116,18,128,18,132,28);
    g.bezierCurveTo(126,36,118,36,112,28);
    g.closePath();
    g.fillStyle='#fff';g.fill();

    // ── white circular hole (bottom-right of leaf) ──
    g.beginPath();
    g.arc(126,152,30,0,Math.PI*2);
    g.fillStyle='#fff';g.fill();

    var png=c.toDataURL('image/png');
    var lk=document.createElement('link');
    lk.rel='apple-touch-icon';lk.href=png;
    document.head.appendChild(lk);
  })();
  </script>

// Load data from Firestore; returns null on failure or no data
const fbLoad = async (uid) => {
  try {
    if (!uid || !window._fbDb || !window._fbDoc || !window._fbGetDoc) return null;
    const ref = window._fbDoc(window._fbDb, "users", uid);
    const snap = await window._fbGetDoc(ref);
    if (snap.exists()) return snap.data();
    return null;
  } catch (e) {
    console.warn("fbLoad error:", e);
    return null;
  }
};

// Save data to Firestore (fire-and-forget, non-blocking)
const fbSave = (uid, data) => {
  if (!uid || !window._fbDb || !window._fbDoc || !window._fbSetDoc) return;
  try {
    window._fbSetDoc(window._fbDoc(window._fbDb, "users", uid), data).catch(e => console.warn("fbSave error:", e));
  } catch (e) {
    console.warn("fbSave error:", e);
  }
};

  const now = new Date();
  if(now.getHours() < 5){ now.setDate(now.getDate()-1); }

};
const nowHour  = () => new Date().getHours();
const weekKey  = d => { const dt=new Date(d||Date.now()); const y=dt.getFullYear(); const s=new Date(y,0,1); return `${y}-W${Math.ceil(((dt-s)/86400000+s.getDay()+1)/7)}`; };
const monthKey = d => { const dt=new Date(d||Date.now()); return `${dt.getFullYear()}-${dt.getMonth()+1}`; };
const canDoR   = q => {
  if (!q.lastDone) return true;
  const now = new Date();
  const last = new Date(q.lastDone);
  if (q.period === "weekly") {
    // 找上一个周日05:00作为重置时间点
    const resetDay = new Date(now);
    resetDay.setHours(5,0,0,0);
    const dow = resetDay.getDay(); // 0=Sun
    resetDay.setDate(resetDay.getDate() - dow); // 回到本周日05:00
    // 如果现在还没到本周日05:00，则取上周日05:00
    if (now < resetDay) resetDay.setDate(resetDay.getDate() - 7);
    return last < resetDay;
  }
  if (q.period === "monthly") {
    // 本月1日05:00
    const resetDay = new Date(now.getFullYear(), now.getMonth(), 1, 5, 0, 0, 0);
    if (now < resetDay) {
      // 还没到本月1日05:00，取上月1日05:00
      resetDay.setMonth(resetDay.getMonth() - 1);
    }
    return last < resetDay;
  }
  return true;
};

const seededRand = (seed) => {
  let h=0; for(let i=0;i<seed.length;i++) h=Math.imul(31,h)+seed.charCodeAt(i)|0;
  return ()=>{ h^=h<<13; h^=h>>17; h^=h<<5; return (h>>>0)/4294967296; };
};

const getBadgeParams = (name,rarity) => {
  const r=seededRand(name+rarity);
  const sides=rarity==="legend"?[6,7,8][Math.floor(r()*3)]:rarity==="rare"?[4,5,6][Math.floor(r()*3)]:[0,3,4][Math.floor(r()*3)];
  const palettes=[
    ["#FF9A8B","#FFD3B6"],["#A8EDEA","#FED6E3"],["#A18CD1","#FBC2EB"],
    ["#FCCB90","#D57EEB"],["#84FAB0","#8FD3F4"],["#FDDB92","#D1FDFF"],
    ["#B7F8DB","#50A7C2"],["#FEC195","#FF7BB3"],["#E0C3FC","#8EC5FC"],
    ["#F9D976","#F39F86"],
  ];
  const pal=palettes[Math.floor(r()*palettes.length)];
  const rot=Math.floor(r()*360);
  return {sides,c1:pal[0],c2:pal[1],rot};
};

function BadgeSVG({name,rarity,size=60}){
  const p=getBadgeParams(name,rarity);
  const rc=RARITY_CFG[rarity];
  const cx=size/2,cy=size/2,r=size*.42;
  let shapePath=null;
  if(p.sides!==0){
    const pts=[];
    for(let i=0;i<p.sides;i++){
      const a=(i*2*Math.PI/p.sides)-Math.PI/2+(p.rot*Math.PI/180);
      pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);
    }
    // rounded polygon via quadratic curves
    shapePath=pts.map((pt,i)=>`${i===0?"M":"L"}${pt[0].toFixed(1)},${pt[1].toFixed(1)}`).join(" ")+"Z";
  }
  const uid=`b${name.charCodeAt(0)}${name.charCodeAt(1)||0}${rarity[0]}`;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:"block",filter:`drop-shadow(0 2px ${rarity==="legend"?8:4}px ${rc.glow})`}}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={p.c1}/>
          <stop offset="100%" stopColor={p.c2}/>
        </linearGradient>
      </defs>
      {shapePath===null
        ?<circle cx={cx} cy={cy} r={r} fill={`url(#g${uid})`} stroke={rc.border} strokeWidth={size*.05}/>
        :<path d={shapePath} fill={`url(#g${uid})`} stroke={rc.border} strokeWidth={size*.05} strokeLinejoin="round"/>
      }
      {rarity==="legend"&&<circle cx={cx} cy={cy} r={r*.65} fill="none" stroke="rgba(255,255,255,.35)" strokeWidth="1.5" strokeDasharray="3 3"/>}
      <circle cx={cx*.7} cy={cy*.65} r={size*.07} fill="rgba(255,255,255,.5)"/>
      <text x={cx} y={cy+size*.07} textAnchor="middle" fontSize={size*.2} fill="rgba(255,255,255,.95)" fontWeight="800" style={{fontFamily:"'Nunito','Noto Sans SC',sans-serif"}}>
        {name.slice(0,2)}
      </text>
    </svg>
  );
}

const grantBadge=(level,existing)=>{
  const rand=Math.random();
  let pool;
  if(level>=15&&rand<.15) pool=BADGE_LANDMARKS.filter(b=>b.rarity==="legend");
  else if(level>=5&&rand<.35) pool=BADGE_LANDMARKS.filter(b=>b.rarity==="rare");
  else pool=BADGE_LANDMARKS.filter(b=>b.rarity==="common");
  const owned=new Set(existing.map(b=>b.name));
  const avail=pool.filter(b=>!owned.has(b.name));
  const src=avail.length>0?avail:pool;
  const pick=src[Math.floor(Math.random()*src.length)];
  return{...pick,id:Date.now(),level,date:todayKey()};
};

const clamp  = v=>Math.max(0,Math.min(100,Math.round(Number(v)||0)));
const applyB = (stats,bonus={})=>{
  const out={};
  Object.keys(stats).forEach(k=>{out[k]={...stats[k],value:clamp(stats[k].value+(bonus[k]||0))};});
  return out;
};
// Apply bonus to longStats with overflow → flowers
const applyLongWithOverflow = (longStats, bonus={})=>{
  const out={...longStats};
  let extraFlowers=0;
  Object.keys(bonus).forEach(k=>{
    if(!out[k])return;
    const newVal=out[k].value+(bonus[k]||0);
    if(newVal>100){extraFlowers+=Math.floor(newVal-100);out[k]={...out[k],value:100};}
    else{out[k]={...out[k],value:Math.max(0,Math.round(newVal))};}
  });
  return{longStats:out,extraFlowers};
};

// Get week key in 年-W周 format (week starts Sunday)
const getWeekKey = (date=new Date())=>{
  const d=new Date(date);
  const day=d.getDay(); // 0=Sunday
  const sunday=new Date(d);sunday.setDate(d.getDate()-day);
  const y=sunday.getFullYear();
  const start=new Date(y,0,1);
  const weekNum=Math.ceil(((sunday-start)/86400000+start.getDay()+1)/7);
  return `${y}-W${weekNum}`;
};

// Get the Saturday of the current week
const getWeekSaturday = ()=>{
  const d=new Date();
  const day=d.getDay();
  const sat=new Date(d);sat.setDate(d.getDate()+(6-day));
  return sat;
};

// Count how many times a habit was checked this week (Sun–Sat)
const countWeekChecks=(checkedHabits,habitId)=>{
  let count=0;
  const now=new Date();
  const day=now.getDay();
  const sunday=new Date(now);sunday.setDate(now.getDate()-day);
  for(let i=0;i<=6;i++){
    const dt=new Date(sunday);dt.setDate(sunday.getDate()+i);
    const k=dt.toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});
    if(checkedHabits[k]&&checkedHabits[k][habitId])count++;
  }
  return count;
};

// Migrate old weeklyBonus.stat (string) to weeklyBonus.stats (array)
const migrateWeeklyBonus=(h)=>{
  if(!h.weeklyBonus) return {...h,weeklyBonus:{stats:[]},weeklyTarget:h.weeklyTarget||5};
  if(h.weeklyBonus.stat!==undefined&&!h.weeklyBonus.stats){
    const st=h.weeklyBonus.stat;
    return {...h,weeklyBonus:{stats:st?[st]:[]},weeklyTarget:h.weeklyTarget||5};
  }
  if(!h.weeklyBonus.stats) return {...h,weeklyBonus:{...h.weeklyBonus,stats:[]},weeklyTarget:h.weeklyTarget||5};
  if(h.weeklyTarget===undefined) return {...h,weeklyTarget:5};
  return h;
};

// Run weekly settlement - returns {newLongStats, extraFlowers, gains}
const runWeeklySettle=(habits,checkedHabits,longStats)=>{
  const gains=[];
  let bonusMap={};
  habits.forEach(h=>{
    const stats=h.weeklyBonus?.stats||[];
    const target=h.weeklyTarget||5;
    const cnt=countWeekChecks(checkedHabits,h.id);
    if(cnt>=target&&stats.length>0){
      stats.forEach(stat=>{
        if(!longStats[stat])return;
        gains.push({label:h.label,icon:h.icon,delta:1,stat});
        bonusMap[stat]=(bonusMap[stat]||0)+1;
      });
    }
  });
  const{longStats:newLong,extraFlowers}=applyLongWithOverflow(longStats,bonusMap);
  return{newLongStats:newLong,extraFlowers,gains};
};
const rwdTxt=(r={},ls=DEF_LONG,ss=DEF_SHORT)=>{
  const p=[];
  if(r.xp||0)p.push(`🌸+${r.xp||0}`);
  Object.entries(r.long||{}).forEach(([k,v])=>{if(v)p.push(`${ls[k]?.icon||""}+${v}`)});
  Object.entries(r.short||{}).forEach(([k,v])=>{if(v)p.push(`${ss[k]?.icon||""}+${v}`)});
  return p.join("  ");
};

function SettingsLoginSection({user,setUser,setS,setShowSettings,pop}){
  const [mode,setMode]=useState("idle"); // idle|login|register
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const reset=()=>{setMode("idle");setEmail("");setPass("");setErr("");};

  const doGoogle=async()=>{
    setLoading(true);setErr("");
    try{
      const r=await window._fbSignInWithPopup(window._fbAuth,window._fbGoogleProvider);
      _fbUid=r.user.uid;setUser(r.user);pop("🎉 Google 登录成功！");reset();
    }catch(e){setErr(e.message);}
    setLoading(false);
  };
  const doEmail=async(isReg)=>{
    if(!email||!pass){setErr("请填写邮箱和密码");return;}
    setLoading(true);setErr("");
    try{
      const fn=isReg?window._fbCreateUser:window._fbSignInWithEmail;
      const r=await fn(window._fbAuth,email,pass);
      _fbUid=r.user.uid;setUser(r.user);pop(isReg?"🎉 注册成功！":"☁️ 已登录云端");reset();
    }catch(e){
      const msg=e.code==="auth/user-not-found"?"账号不存在":e.code==="auth/wrong-password"?"密码错误":e.code==="auth/email-already-in-use"?"邮箱已注册":e.code==="auth/invalid-email"?"邮箱格式不对":e.message;
      setErr(msg);
    }
    setLoading(false);
  };
  const doSignOut=async()=>{
    await window._fbSignOut(window._fbAuth);
    _fbUid=null;setUser(null);setS(null);setShowSettings(false);pop("👋 已退出登录");
  };

  return(
    <div style={{marginBottom:16,paddingBottom:16,borderBottom:"2px dashed #EDD9A3"}}>
      <div style={{fontSize:11,color:"#7A5C44",fontWeight:900,letterSpacing:.5,marginBottom:10}}>☁️ 账号与云同步</div>

            <div style={{fontSize:12,color:"#3A7D3E",fontWeight:800}}>已登录</div>

          </div>
          <button onClick={doSignOut} style={{fontSize:11,fontWeight:800,color:"#C0392B",background:"#FFF0EE",border:"2px solid #FFB3A8",borderRadius:10,padding:"6px 12px",cursor:"pointer"}}>退出</button>
        </div>
      ) : mode==="idle" ? (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:12,color:"#B09070",marginBottom:2}}>登录后数据自动云端同步，多设备共享 🌿</div>
          <button disabled={loading} onClick={doGoogle} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#fff",border:"2px solid #EDD9A3",borderRadius:14,padding:"11px",fontSize:13,fontWeight:800,color:"#3D2B1F",cursor:"pointer",boxShadow:"0 2px 6px rgba(90,60,30,.08)"}}>

// ─── app ─────────────────────────────────────────────────
function App(){
  const [user,        setUser]         = useState(undefined); // undefined=loading, null=logged out, obj=logged in
  const [lang,        setLangState]    = useState(getLang);
  const [s,           setS]           = useState(null);
  const [tab,         setTab]         = useState("home");
  const [toast,       setToast]       = useState(null);
  const [modal,       setModal]       = useState(null);
  const [drawn,       setDrawn]       = useState(null);
  const [qForm,       setQForm]       = useState(null);
  const [evForm,      setEvForm]      = useState(null);
  const [habEdit,     setHabEdit]     = useState(null);
  const [letterD,     setLetterD]     = useState("");
  const [newBadge,    setNewBadge]    = useState(null);
  const [showSettings,setShowSettings]= useState(false);
  const [editingMotto,setEditingMotto]= useState(false);
  const [mottoD,      setMottoD]      = useState("");
  const [showWeeklyResult,setShowWeeklyResult]=useState(false);
  const [showFirework,    setShowFirework]    = useState(false);
  const [showMorning,     setShowMorning]     = useState(false);
  const [morningVals,     setMorningVals]     = useState({mood:80,energy:80,cognition:80});
  const popT     = useRef(null);
  const importRef= useRef(null);

  // Firebase auth state listener
  useEffect(()=>{
    const waitForFb = () => {
      if(window._fbOnAuthStateChanged&&window._fbAuth){
        window._fbOnAuthStateChanged(window._fbAuth, async (fbUser)=>{
          if(fbUser){
            _fbUid = fbUser.uid;
            setUser(fbUser);
          } else {
            _fbUid = null;
            setUser(null);
          }
        });
      } else {
        // Firebase not loaded yet - use localStorage only
        setUser(null);
      }
    };
    if(window._fbAuth) waitForFb();
    else window.addEventListener("firebase-ready", waitForFb, {once:true});
    // Timeout fallback: if Firebase never loads, just go local
    const t = setTimeout(()=>{ if(user===undefined) setUser(null); }, 3000);
    return ()=>clearTimeout(t);
  },[]);

  // Load data when user state is known
  useEffect(()=>{
    if(user===undefined) return; // still loading
    const initData = async () => {
    const today=todayKey();
    let d = null;
    let fromCloud = false;
    // Cloud-first: if logged in, always pull from Firestore and overwrite local
    if(user && user.uid){
      d = await fbLoad(user.uid);
      if(d){ lsSet(d); fromCloud = true; }
    }
    if(!d) d=dbGet();
    if(!d){const ns={...INIT,lastDate:today,lastResetDate:today};dbSet(ns);setS(ns);return;}
    if(!Array.isArray(d.habits))      d.habits=DEF_HABITS;
    if(!d.checkedHabits)              d.checkedHabits={};
    if(!d.recurringQuests)            d.recurringQuests=INIT.recurringQuests;
    if(!d.rescueList)                 d.rescueList=DEF_RESCUE;
    else{const existing=new Set(d.rescueList);const added=DEF_RESCUE.filter(x=>!existing.has(x));if(added.length)d.rescueList=[...d.rescueList,...added];}
    if(d.rescueThreshold===undefined) d.rescueThreshold=60;
    if(!d.bigEvents)                  d.bigEvents=[];
    if(!d.badges)                     d.badges=[];
    if(!d.dayColors)                  d.dayColors={};
    if(!d.daySummaries)               d.daySummaries={};
    if(!d.motto)                      d.motto="生活是一场冒险，每天都是新的探索 🌿";
    if(!d.eventTags)                  d.eventTags=["担心","开心","感恩","反思","突破","座右铭"];
    else if(!d.eventTags.includes("座右铭")) d.eventTags=[...d.eventTags,"座右铭"];
    if(!d.lastWeeklySettleDate)       d.lastWeeklySettleDate="";
    if(d.pendingWeeklyResult===undefined) d.pendingWeeklyResult=null;
    // Migrate longStats: add growth if missing
    if(!d.longStats.growth)           d.longStats={...d.longStats,growth:{label:"成长",icon:"📚",value:60,color:"#8B5CF6"}};
    // Force-update stat icons to latest emojis (overwrite whatever is in saved data)
    if(d.longStats.health)  d.longStats={...d.longStats,health: {...d.longStats.health, icon:"🌿"}};
    if(d.longStats.social)  d.longStats={...d.longStats,social: {...d.longStats.social, icon:"🤝"}};
    if(d.longStats.growth)  d.longStats={...d.longStats,growth: {...d.longStats.growth, icon:"📚"}};
    if(d.longStats.wealth)  d.longStats={...d.longStats,wealth: {...d.longStats.wealth, icon:"💰"}};
    if(d.shortStats.mood)   d.shortStats={...d.shortStats,mood: {...d.shortStats.mood,  icon:"☀️"}};
    // Migrate: add cognition if missing, fix label if stale
    if(!d.shortStats.cognition) d.shortStats={...d.shortStats,cognition:{label:"脑力",icon:"🧠",value:80,color:"#70B8E0"}};
    else if(d.shortStats.cognition.label!=="脑力") d.shortStats={...d.shortStats,cognition:{...d.shortStats.cognition,label:"脑力"}};
    // Migrate habits: ensure weeklyBonus.stats array + weeklyTarget
    d.habits=d.habits.map(h=>{
      if(h.longBonus!==undefined&&h.weeklyBonus===undefined){
        const lb=h.longBonus||{};
        const firstStat=Object.keys(lb)[0]||"";
        h={...h,weeklyBonus:{stats:firstStat?[firstStat]:[]},weeklyTarget:5};
        delete h.longBonus;
      }
      return migrateWeeklyBonus(h);
    });
    // Add focus habit if missing
    if(!d.habits.find(h=>h.id==="focus")){
      d.habits=[...d.habits,{id:"focus",label:"专注",icon:"🎯",weeklyBonus:{stats:["growth"]},weeklyTarget:4,shortBonus:{mood:5}}];
    }

    const h=nowHour();
    const resetDay=h>=5?today:(()=>{const dt=new Date();dt.setDate(dt.getDate()-1);return dt.toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});})();
    if(d.lastResetDate!==resetDay){
      const snap={date:d.lastDate||d.lastResetDate,long:d.longStats,short:d.shortStats,level:d.player.level,letter:d.letter};
      const hist=[...(d.history||[]),snap].slice(-60);
      const rs={};Object.keys(d.shortStats).forEach(k=>rs[k]={...d.shortStats[k],value:80});
      d={...d,shortStats:rs,history:hist,lastDate:today,lastResetDate:resetDay};
    } else if(d.lastDate!==today){d={...d,lastDate:today};}

    // Check weekly settlement: trigger if it's Saturday (day 6) and not yet settled this week
    const now=new Date();
    const curWeekKey=getWeekKey(now);
    if(now.getDay()===0&&d.lastWeeklySettleDate!==curWeekKey){
      const{newLongStats,extraFlowers,gains}=runWeeklySettle(d.habits,d.checkedHabits,d.longStats);
      d={...d,longStats:newLongStats,player:{...d.player,xp:d.player.xp+extraFlowers},
         lastWeeklySettleDate:curWeekKey,
         pendingWeeklyResult:{gains,flowers:extraFlowers}};
    }

    dbSet(d);setS(d);
    // 签到检测：每天首次打开时弹出
    const morningKey=`morningCheckin_${today}`;
    if(!localStorage.getItem(morningKey)){
      // 初始值取当前 shortStats（可能已被重置为80）
      setMorningVals({
        mood:      d.shortStats.mood?.value      ?? 80,
        energy:    d.shortStats.energy?.value    ?? 80,
        cognition: d.shortStats.cognition?.value ?? 80,
      });
      setTimeout(()=>setShowMorning(true), 600);
    }
    // If data came from cloud, show a brief toast (deferred so pop() is available)
    if(fromCloud){ setTimeout(()=>pop("☁️ 已从云端同步最新数据"),300); }
    // If logged in but no cloud data yet (first login on this account), upload local data
    if(user && user.uid && !fromCloud){ fbSave(user.uid, d); }
    }; // end initData
    initData();
  },[user]);

  const save=useCallback(ns=>{setS(ns);dbSet(ns);fbSave(_fbUid,ns);},[]);
  const pop=msg=>{setToast(msg);clearTimeout(popT.current);popT.current=setTimeout(()=>setToast(null),2600);};

  // Auto-show weekly result popup once
  useEffect(()=>{
    if(s&&s.pendingWeeklyResult){setShowWeeklyResult(true);}
  },[s?.pendingWeeklyResult]);

  const lvUp=(xp,lv,xpN,badges)=>{
    let nb=[...(badges||[])],latest=null;
    while(xp>=xpN){lv++;xp-=xpN;xpN=100;const badge=grantBadge(lv,nb);nb.push(badge);latest=badge;}
    return{xp,lv,xpN:100,newBadges:nb,latestBadge:latest};
  };

  const completeQuest=id=>{
    const all=[...s.mainQuests,...s.sideQuests];const q=all.find(x=>x.id===id);if(!q||q.done)return;
    const r=q.reward||{};
    const lc={},sc={};
    Object.keys(s.longStats).forEach(k=>{if(r.long&&r.long[k])lc[k]=r.long[k];});
    Object.keys(s.shortStats).forEach(k=>{if(r.short&&r.short[k])sc[k]=r.short[k];});
    const{longStats:newLong,extraFlowers}=applyLongWithOverflow(s.longStats,lc);
    let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+(r.xp||0)+extraFlowers,s.player.level,s.player.xpNext,s.badges);
    const isMain=s.mainQuests.find(x=>x.id===id);
    const toastMsg=isMain?randPick(MAIN_TOASTS):randPick(SIDE_TOASTS);
    if(s.player.level===lv)pop(`${toastMsg} ${rwdTxt(r,s.longStats,s.shortStats)}`);
    else{if(latestBadge)setNewBadge(latestBadge);}
    // 确保"任务"标签存在
    const existingTags=s.eventTags||[];
    const newTags=existingTags.includes("任务")?existingTags:[...existingTags,"任务"];
    const ev={id:Date.now(),date:todayKey(),text:q.title+(q.desc?`：${q.desc}`:""),xp:r.xp||0,statChanges:{...lc,...sc},tag:"任务"};
    save({...s,
      player:{...s.player,xp,level:lv,xpNext:xpN},
      badges:newBadges,
      longStats:newLong,
      shortStats:applyB(s.shortStats,sc),
      mainQuests:s.mainQuests.filter(q2=>q2.id!==id),
      sideQuests:s.sideQuests.filter(q2=>q2.id!==id),
      bigEvents:[...(s.bigEvents||[]),ev].slice(-2000),
      eventTags:newTags,
    });
  };
  const deleteQuest=id=>{
    save({...s,mainQuests:s.mainQuests.filter(q=>q.id!==id),sideQuests:s.sideQuests.filter(q=>q.id!==id),recurringQuests:s.recurringQuests.filter(q=>q.id!==id)});
    pop("🗑️ 已删除");
  };
  const completeRecurring=id=>{
    const q=s.recurringQuests.find(x=>x.id===id);if(!q)return;
    const r=q.reward||{};
    const gained=r.xp||0;
    let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+gained,s.player.level,s.player.xpNext,s.badges);
    if(s.player.level===lv)pop(`${randPick(RECURRING_TOASTS)(q.title)} ${rwdTxt(r,s.longStats,s.shortStats)}`);
    else{if(latestBadge)setNewBadge(latestBadge);}
    save({...s,player:{...s.player,xp,level:lv,xpNext:xpN},badges:newBadges,
      longStats:applyB(s.longStats,r.long||{}),shortStats:applyB(s.shortStats,r.short||{}),
      recurringQuests:s.recurringQuests.map(q2=>q2.id===id?{...q2,lastDone:new Date().toISOString()}:q2),
    });
  };
  const toggleHabit=hid=>{
    const today=todayKey(),th=s.checkedHabits[today]||{},was=!!th[hid];
    const h=s.habits.find(x=>x.id===hid);if(!h)return;
    let ns={...s,checkedHabits:{...s.checkedHabits,[today]:{...th,[hid]:!was}}};
    if(!was){
      // Apply short stats (capped 0~100, supports negative bonus)
      const sb=h.shortBonus||{};
      const newShort={};
      Object.keys(ns.shortStats).forEach(k=>{
        const add=sb[k]||0;
        newShort[k]={...ns.shortStats[k],value:Math.min(100,Math.max(0,ns.shortStats[k].value+add))};
      });
      ns.shortStats=newShort;
      // +1 flower (xp)
      ns.player={...ns.player,xp:ns.player.xp+1};
      // 检测今日全部完成
      const newTh={...th,[hid]:true};
      const allDone=s.habits.length>0&&s.habits.every(x=>newTh[x.id]);
      if(allDone){
        ns.player={...ns.player,xp:ns.player.xp+10};
        setTimeout(()=>setShowFirework(true),100);
        pop(randPick(ALLDONE_TOASTS));
      } else {
        pop(randPick(HABIT_TOASTS)(h.icon,h.label));
      }
    } else {
      // Undo short stats
      const sb=h.shortBonus||{};
      const newShort={};
      Object.keys(ns.shortStats).forEach(k=>{
        const add=sb[k]||0;
        newShort[k]={...ns.shortStats[k],value:Math.min(100,Math.max(0,ns.shortStats[k].value-add))};
      });
      ns.shortStats=newShort;
      // -1 flower
      ns.player={...ns.player,xp:Math.max(0,ns.player.xp-1)};
    }
    save(ns);
  };
  const saveHabit=draft=>{
    if(!draft.label.trim())return;
    const exists=s.habits.find(h=>h.id===draft.id);
    save({...s,habits:exists?s.habits.map(h=>h.id===draft.id?draft:h):[...s.habits,{...draft,id:"h_"+Date.now()}]});
    setModal(null);setHabEdit(null);pop("✏️ 已保存");
  };
  const deleteHabit=id=>{save({...s,habits:s.habits.filter(h=>h.id!==id)});setModal(null);setHabEdit(null);pop("🗑️ 已删除");};
  const saveQuest=()=>{
    if(!qForm.title.trim())return;
    const reward={xp:Number(qForm.xp)||10,long:{...qForm.long},short:{...qForm.short}};
    Object.keys(reward.long).forEach(k=>{if(!reward.long[k])delete reward.long[k];});
    Object.keys(reward.short).forEach(k=>{if(!reward.short[k])delete reward.short[k];});

      save({...s,recurringQuests:[...s.recurringQuests,{id:"r_"+Date.now(),title:qForm.title,desc:qForm.desc,period:qForm.period||"weekly",reward,lastDone:""}]});

      const q={id:Date.now(),title:qForm.title,desc:qForm.desc,reward,done:false};

  };
  const saveBigEvent=()=>{
    if(!evForm.text.trim())return;
    const evXp=Number(evForm.xp)||0;
    const isEdit=!!evForm.id;
    const lc={},sc={};
    Object.keys(s.longStats).forEach(k=>{if(evForm.changes[k])lc[k]=evForm.changes[k];});

    if(isEdit){
      // editing: just update text/tag/xp/changes, don't re-apply stat bonuses
      const updatedEvents=s.bigEvents.map(ev=>ev.id===evForm.id
        ?{...ev,text:evForm.text,xp:evXp,statChanges:evForm.changes,tag:evForm.tag||""}
        :ev);
      save({...s,bigEvents:updatedEvents});
      pop("✏️ 大事已更新");
    } else {
      const ev={id:Date.now(),date:todayKey(),text:evForm.text,xp:evXp,statChanges:evForm.changes,tag:evForm.tag||""};
      const{longStats:newLong,extraFlowers}=applyLongWithOverflow(s.longStats,lc);
      let{xp,lv,xpN,newBadges,latestBadge}=lvUp(s.player.xp+evXp+extraFlowers,s.player.level,s.player.xpNext,s.badges);
      if(s.player.level===lv)pop("📝 岛上新闻更新中……");
      else{if(latestBadge)setNewBadge(latestBadge);}
      save({...s,player:{...s.player,xp,level:lv,xpNext:xpN},badges:newBadges,bigEvents:[...s.bigEvents,ev].slice(-2000),longStats:newLong,shortStats:applyB(s.shortStats,sc)});
    }
    setModal(null);setEvForm(null);
  };
  const handleImport=d=>{
    const merged={...INIT,...d,lastDate:todayKey(),lastResetDate:todayKey(),checkedHabits:d.checkedHabits||{},badges:d.badges||[],dayColors:d.dayColors||{},daySummaries:d.daySummaries||{},motto:d.motto||INIT.motto,eventTags:d.eventTags||INIT.eventTags,lastWeeklySettleDate:d.lastWeeklySettleDate||"",pendingWeeklyResult:null};
    save(merged);pop("✅ 数据导入成功！");setShowSettings(false);
  };

  if(!s)return(
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#AEE6F8,#D4F0FF)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{animation:"float 2s ease-in-out infinite",fontSize:48}}>🌿</div>
      <div style={{color:"#5BAF5F",fontSize:14,fontWeight:700,letterSpacing:2}}>小岛加载中…</div>
    </div>
  );

  const today=todayKey(),th=s.checkedHabits[today]||{},doneCnt=s.habits.filter(h=>th[h.id]).length;
  const xpPct=Math.min(100,(s.player.xp/s.player.xpNext)*100);
  const lowMood=s.shortStats.mood?.value<s.rescueThreshold,lowEnergy=s.shortStats.energy?.value<s.rescueThreshold,lowCognition=s.shortStats.cognition?.value<s.rescueThreshold;
  const showAlert=lowMood||lowEnergy||lowCognition;
  const badges=s.badges||[];

  const t=useT();
  const TABS=[["home","🏝️",t("岛况","Home")],["quests","🌴",t("任务","Quests")],["habits","🐳",t("打卡","Check-in")],["log","🎨",t("岛记","Log")]];

  const toggleLang=()=>{const nl=lang==="zh"?"en":"zh";setLangState(nl);setLang(nl);};
  return(
    <LangCtx.Provider value={lang}>
    <div style={{fontFamily:"'Nunito','Noto Sans SC','PingFang SC',sans-serif",background:"#E8F5E9",minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"#3D2B1F"}}>

      {/* firework overlay */}
      {showFirework&&<Firework onDone={()=>setShowFirework(false)}/>}

      {/* toast */}
      {toast&&<div style={{position:"fixed",top:"env(safe-area-inset-top,18px)",left:"50%",transform:"translateX(-50%)",background:"#5BAF5F",color:"#fff",padding:"10px 24px",borderRadius:28,fontSize:13,fontWeight:700,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 6px 24px rgba(91,175,95,.45)",animation:"pop .25s ease"}}>{toast}</div>}

      {/* weekly settlement result popup */}
      {showWeeklyResult&&s.pendingWeeklyResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,40,20,.6)",zIndex:160,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{setShowWeeklyResult(false);save({...s,pendingWeeklyResult:null});}}>
          <div style={{background:"#FFFDF5",borderRadius:28,padding:"28px 24px",maxWidth:320,width:"92%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.25)",border:"3px solid #8B5CF6"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:32,marginBottom:4}}>🎊</div>
            <div style={{fontSize:17,fontWeight:900,color:"#3D2B1F",marginBottom:4}}>{t("本周结算完成！","Weekly settlement!")}</div>
            <div style={{fontSize:12,color:"#8B5CF6",fontWeight:700,marginBottom:14}}>每周六·属性成长结算</div>
            {s.pendingWeeklyResult.gains.length===0
              ?<div style={{fontSize:13,color:"#B09070",marginBottom:14}}>本周没有达到5天目标的打卡项 🌱</div>
              :<div style={{marginBottom:14}}>
                {s.pendingWeeklyResult.gains.map((g,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#F8F0FF",border:"1.5px solid #C9A8E8",borderRadius:12,padding:"8px 14px",marginBottom:6}}>
                    <span style={{fontSize:14}}>{g.icon} {g.label}</span>
                    <span style={{fontSize:13,fontWeight:800,color:"#8B5CF6"}}>{s.longStats[g.stat]?.icon||""}+1 {s.longStats[g.stat]?.label||g.stat}</span>
                  </div>
                ))}
              </div>
            }
            {s.pendingWeeklyResult.flowers>0&&(
              <div style={{background:"#F0FFF0",border:"2px solid #7BC67E",borderRadius:12,padding:"8px 14px",marginBottom:14,fontSize:13,fontWeight:700,color:"#3A7D3E"}}>
                🌸 属性溢出奖励 +{s.pendingWeeklyResult.flowers} 花
              </div>
            )}
            <button style={{...S.cfmBtn}} onClick={()=>{setShowWeeklyResult(false);save({...s,pendingWeeklyResult:null});}}>{t("太棒了！继续加油 🌿","Awesome! Keep going 🌿")}</button>
          </div>
        </div>
      )}

      {/* badge popup */}
      {newBadge&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,40,20,.55)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setNewBadge(null)}>
          <div style={{background:"#FFFDF5",borderRadius:28,padding:"32px 28px",maxWidth:300,width:"90%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.25)",border:"3px solid #7BC67E"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:28,marginBottom:4}}>🎉</div>
            <div style={{fontSize:14,color:"#5BAF5F",fontWeight:700,marginBottom:4}}>{randPick(LEVELUP_TOASTS)(newBadge.level)}</div>
            <div style={{display:"flex",justifyContent:"center",margin:"16px 0",animation:"badgePop .5s ease"}}>
              <BadgeSVG name={newBadge.name} rarity={newBadge.rarity} size={90}/>
            </div>
            <div style={{fontSize:18,fontWeight:900,color:"#3D2B1F",marginBottom:6}}>{newBadge.name}</div>
            <div style={{fontSize:12,color:RARITY_CFG[newBadge.rarity].text,background:RARITY_CFG[newBadge.rarity].bg,borderRadius:20,padding:"4px 14px",display:"inline-block",marginBottom:20,fontWeight:700,border:`1.5px solid ${RARITY_CFG[newBadge.rarity].border}`}}>
              {RARITY_CFG[newBadge.rarity].star} {RARITY_CFG[newBadge.rarity].label}
            </div>
            <button style={S.cfmBtn} onClick={()=>setNewBadge(null)}>{t("太棒了！🌿","Awesome! 🌿")}</button>
          </div>
        </div>
      )}

      {/* settings drawer */}
      {showSettings&&(
        <div style={S.overlay} onClick={()=>setShowSettings(false)}>
          <div style={{...S.drawer,maxHeight:"92vh"}} onClick={e=>e.stopPropagation()}>
            <div style={S.handle}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:17,fontWeight:900,color:"#3D2B1F"}}>{t("⚙️ 岛屿设置","⚙️ Settings")}</div>
              <button style={{background:"#F5E6C8",border:"none",borderRadius:"50%",width:32,height:32,fontSize:16,cursor:"pointer",color:"#A86440"}} onClick={()=>setShowSettings(false)}>✕</button>
            </div>
            <SettingsLoginSection user={user} setUser={setUser} setS={setS} setShowSettings={setShowSettings} pop={pop}/>
            <div style={S.settingSection}>
              <div style={S.cl}>🐚 角色设置</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,color:"#7A5C44",minWidth:52,fontWeight:700}}>岛主名</span>
                <input style={{...S.inp,marginBottom:0,flex:1}} value={s.player.name} onChange={e=>save({...s,player:{...s.player,name:e.target.value}})}/>
              </div>
            </div>
            <CollapsibleRescueSection s={s} save={save} pop={pop}/>
            <div style={S.settingSection}>
              <div style={S.cl}>💾 数据管理</div>
              <div style={{fontSize:12,color:"#B09070",marginBottom:10}}>包含离岛旅行、岛上新闻、历史记录等全部数据</div>
              <button style={{...S.cfmBtn,marginBottom:10}} onClick={()=>exportData(s)}>{t("📤 导出数据备份","📤 Export Backup")}</button>
              <button style={{...S.cfmBtn,background:"linear-gradient(135deg,#70B8E0,#5BAF5F)"}} onClick={()=>importRef.current?.click()}>{t("📥 导入数据","📥 Import Data")}</button>
              <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(!e.target.files[0])return;importData(e.target.files[0],handleImport,err=>pop(`❌ 导入失败：${err}`));e.target.value="";}}/>
              <div style={{fontSize:11,color:"#B09070",marginTop:8,textAlign:"center"}}>导入将覆盖现有数据，请先导出备份</div>
            </div>
            <div style={{height:20}}/>
          </div>
        </div>
      )}

      {/* AC header scene */}
      <HeaderScene
        playerName={s.player.name}
        level={s.player.level}
        xpPct={xpPct}
        xp={s.player.xp}
        xpNext={s.player.xpNext}
        doneCnt={doneCnt}
        totalHabits={s.habits.length}
        habits={s.habits}
        th={th}
        onGear={()=>setShowSettings(true)}
        onGift={()=>setModal("rescue")}
      />

      {/* tab bar */}
      <div style={{display:"flex",background:"#FFFDF5",borderTop:"3px solid #A8D8A8",borderBottom:"2px solid #D4EED4",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 12px rgba(91,175,95,.12)"}}>
        {TABS.map(([k,icon,l])=>(
          <button key={k} className={tab===k?"tab-active":""} style={{flex:1,padding:"11px 2px 8px",background:"none",border:"none",color:tab===k?"#5BAF5F":"#B09070",fontSize:11,fontWeight:tab===k?900:600,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"all .2s"}} onClick={()=>setTab(k)}>
            <span style={{fontSize:18,lineHeight:1}}>{icon}</span>
            <span>{l}</span>
          </button>
        ))}
      </div>

      {/* body */}
      <div style={{padding:"14px 14px 0"}}>

        {/* ── 主页 ── */}
        {tab==="home"&&<>
          {showAlert&&(
            <div style={{background:"linear-gradient(135deg,#FFF8DC,#FFF3C4)",border:"2.5px solid #FFD166",borderRadius:20,padding:"14px 16px",marginBottom:12,boxShadow:"0 4px 16px rgba(255,209,102,.3)"}}>

// luminance-based text color
const textOnBg=hex=>{
  if(!hex)return"#7A5C44";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>158?"#3D2B1F":"#fff";
};

// ─── ColorCalendar: 颜色日历回望 ──────────────────────────
function ColorCalendar({history,dayColors,daySummaries,bigEvents,today,todaySnap,onPickColor,onSaveSummary}){
  const [selected,setSelected]=useState(null); // dateKey or null
  const [open,setOpen]=useState(false);
  const [trendMode,setTrendMode]=useState(false);

  // All stat definitions for trend selector
  const TREND_STATS=[
    {k:"health",  label:"健康", icon:"🌿", color:"#5BAF5F",  src:"long"},
    {k:"wealth",  label:"财富", icon:"💰", color:"#E8A020",  src:"long"},
    {k:"social",  label:"友情", icon:"🤝", color:"#70B8E0",  src:"long"},
    {k:"growth",  label:"成长", icon:"📚", color:"#8B5CF6",  src:"long"},
    {k:"mood",    label:"心情", icon:"☀️", color:"#FF9A5C",  src:"short"},
    {k:"energy",  label:"体力", icon:"⚡", color:"#7BC67E",  src:"short"},
    {k:"cognition",label:"脑力",icon:"🧠", color:"#70B8E0",  src:"short"},
  ];
  const [trendStat,setTrendStat]=useState("health");
  const activeStat=TREND_STATS.find(s=>s.k===trendStat)||TREND_STATS[0];

  // Build last-30-days trend data
  const trendData=useMemo(()=>{
    // collect all days including today
    const allEntries=[
      {date:today, long:todaySnap.long, short:todaySnap.short},
      ...(history||[]),
    ];
    // index by date
    const byDate={};
    allEntries.forEach(e=>{if(e.date)byDate[e.date]=e;});
    // last 30 calendar days newest→oldest then reverse for chart
    const days=[];
    for(let i=29;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const dk=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
      const entry=byDate[dk];
      let val=null;
      if(entry){
        const src=activeStat.src==="long"?entry.long:entry.short;
        if(src&&src[trendStat]!=null){
          val=typeof src[trendStat]==="object"?src[trendStat].value:src[trendStat];
        }
      }
      days.push({dk, label:`${d.getMonth()+1}/${d.getDate()}`, val});
    }
    return days;
  },[history,today,todaySnap,trendStat,activeStat]);

  // SVG chart dimensions
  const W=320,H=120,PL=28,PR=10,PT=10,PB=24;
  const CW=W-PL-PR, CH=H-PT-PB;
  const hasData=trendData.some(d=>d.val!==null);

  // Build polyline segments (break on null)
  const segments=useMemo(()=>{
    const segs=[]; let cur=[];
    trendData.forEach((d,i)=>{
      const x=PL+i*(CW/(trendData.length-1));
      const y=d.val!==null?PT+CH-(d.val/100)*CH:null;
      if(y!==null){cur.push({x,y,d});}
      else if(cur.length){segs.push(cur);cur=[];}
    });
    if(cur.length)segs.push(cur);
    return segs;
  },[trendData]);

  // X-axis labels: show ~6 evenly spaced
  const xLabels=trendData.filter((_,i)=>i===0||i===29||i%6===0);

  // Build all days: today + history, sorted newest first
  // Also include dates that have color/summary/events but no history snapshot
  const historyDates=new Set([...(history||[]).map(h=>h.date), today]);
  const extraDates=new Set([
    ...Object.keys(dayColors||{}),
    ...Object.keys(daySummaries||{}),
  ]);
  const missingDays=[...extraDates]
    .filter(d=>d&&!historyDates.has(d))
    .map(d=>({date:d}));

  const allDays=[
    {date:today,...todaySnap,isToday:true},
    ...[...history].reverse(),
    ...missingDays,
  ].sort((a,b)=>b.date>a.date?1:-1);

  // Group by month
  const byMonth=[];
  const monthMap={};
  allDays.forEach(d=>{
    const mk=d.date?d.date.slice(0,7):"";
    if(!monthMap[mk]){monthMap[mk]=[];byMonth.push({mk,days:monthMap[mk]});}
    monthMap[mk].push(d);
  });

  const selectedDay=selected?allDays.find(d=>d.date===selected):null;
  const selectedBg=selected?dayColors[selected]||null:null;
  const selectedEvents=(bigEvents||[]).filter(ev=>ev.date===selected);

  return(
    <div style={{background:"#FFFDF5",borderRadius:22,padding:"16px 16px",marginBottom:12,boxShadow:"0 4px 20px rgba(90,60,30,.08)",border:"2px solid #EDD9A3"}}>
      {/* header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:12,color:"#7A5C44",fontWeight:900,letterSpacing:.5}}>🌈 彩虹收藏</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setTrendMode(m=>!m);setSelected(null);}}
            style={{fontSize:11,fontWeight:800,color:trendMode?"#fff":"#5BAF5F",background:trendMode?"#5BAF5F":"#F0FFF0",border:`2px solid #A8D8A8`,borderRadius:14,padding:"3px 12px",cursor:"pointer"}}>
            {trendMode?"收藏 ◀":"趋势 📈"}
          </button>
          {!trendMode&&<button onClick={()=>setOpen(o=>!o)} style={{fontSize:11,fontWeight:800,color:"#5BAF5F",background:"#F0FFF0",border:"2px solid #A8D8A8",borderRadius:14,padding:"3px 12px",cursor:"pointer"}}>
            {open?"收起 ▲":"展开 ▼"}
          </button>}
        </div>
      </div>

      {/* ── 趋势视图 ── */}
      {trendMode&&(
        <div>
          {/* 属性选择器 */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
            {TREND_STATS.map(st=>(
              <button key={st.k} onClick={()=>setTrendStat(st.k)}
                style={{fontSize:15,padding:"5px 8px",borderRadius:12,
                  border:`2px solid ${trendStat===st.k?st.color:"#E0E0D8"}`,
                  background:trendStat===st.k?st.color+"22":"#FAFAF6",
                  cursor:"pointer",lineHeight:1,transition:"all .15s",
                }}>
                {st.icon}
              </button>
            ))}
          </div>
          {/* 属性名 + 颜色 */}
          <div style={{fontSize:12,fontWeight:800,color:activeStat.color,marginBottom:10,letterSpacing:.3}}>
            {activeStat.icon} {activeStat.label} · 近30天
          </div>
          {/* 折线图 SVG */}
          {!hasData
            ?<div style={{textAlign:"center",padding:"24px 0",fontSize:13,color:"#B09070"}}>暂无数据，记录几天后这里会出现趋势 🌱</div>
            :<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
              {/* Y轴刻度线 */}
              {[0,25,50,75,100].map(v=>{
                const y=PT+CH-(v/100)*CH;
                return<g key={v}>
                  <line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#E8E8E0" strokeWidth="1" strokeDasharray={v===0||v===100?"":"3,3"}/>
                  <text x={PL-4} y={y+3.5} textAnchor="end" fontSize="7" fill="#C0B090">{v}</text>
                </g>;
              })}
              {/* 折线段 */}
              {segments.map((seg,si)=>(
                <polyline key={si}
                  points={seg.map(p=>`${p.x},${p.y}`).join(" ")}
                  fill="none" stroke={activeStat.color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
              ))}
              {/* 数据点 */}
              {trendData.map((d,i)=>{
                if(d.val===null)return null;
                const x=PL+i*(CW/(trendData.length-1));
                const y=PT+CH-(d.val/100)*CH;
                return<circle key={i} cx={x} cy={y} r="3" fill={activeStat.color} stroke="#fff" strokeWidth="1.5"/>;
              })}
              {/* X轴标签 */}
              {xLabels.map((d,i)=>{
                const idx=trendData.indexOf(d);
                const x=PL+idx*(CW/(trendData.length-1));
                return<text key={i} x={x} y={H-4} textAnchor="middle" fontSize="7" fill="#B09070">{d.label}</text>;
              })}
            </svg>
          }
        </div>
      )}

      {/* ── 收藏视图 ── */}
      {!trendMode&&<>
        {/* calendar grid */}
        {byMonth.slice(0,open?byMonth.length:1).map(({mk,days})=>(
          <div key={mk} style={{marginBottom:14}}>
            <div style={{fontSize:10,color:"#B09070",fontWeight:800,marginBottom:8,letterSpacing:1}}>{mk.replace("/","年").replace("/","月")} 月</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {days.map(d=>{
                const bg=dayColors[d.date]||null;
                const hasSummary=!!(daySummaries[d.date]);
                const isSelected=selected===d.date;
                const isToday=d.isToday;
                return(
                  <button
                    key={d.date}
                    onClick={()=>setSelected(isSelected?null:d.date)}
                    title={d.date+(hasSummary?" · "+daySummaries[d.date]:"")}
                    style={{
                      width:32,height:32,borderRadius:10,
                      background:bg||(isToday?"#f4f9e8":"#F0F0EC"),
                      border:isSelected?`2.5px solid #4e6a1a`:isToday?`2px solid #a7c957`:`2px solid ${bg?"rgba(0,0,0,.1)":"#D8D8D0"}`,
                      cursor:"pointer",
                      position:"relative",
                      boxShadow:isSelected?"0 0 0 2px #a7c957":bg?`0 2px 6px ${bg}66`:"none",
                      transition:"all .15s",
                      flexShrink:0,
                    }}
                  >
                    {isToday&&!bg&&<div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:"#a7c957"}}/>}
                  </button>
                );
              })}
            </div>
          </div>
        ))}

        {/* selected day detail */}
        {selected&&selectedDay&&(
          <div style={{marginTop:12,borderTop:"2px dashed #EDD9A3",paddingTop:14,animation:"fadeSlideUp .25s ease"}}>
            <DayEntry
              h={selectedDay}
              isToday={selectedDay.isToday}
              bg={selectedBg}
              summary={daySummaries[selected]||""}
              onPickColor={color=>onPickColor(selected,color)}
              onSaveSummary={text=>onSaveSummary(selected,text)}
            />
            {/* that day's big events */}
            {selectedEvents.length>0&&(
              <div style={{marginTop:4}}>
                {selectedEvents.map(ev=>(
                  <div key={ev.id} style={{padding:"8px 10px",borderRadius:12,background:"#FAFFF8",border:"1.5px dashed #C8E8C8",marginBottom:6,fontSize:13,color:"#3D2B1F",lineHeight:1.6}}>
                    {ev.tag&&<span style={{fontSize:10,fontWeight:800,color:"#5BAF5F",marginRight:6}}>#{ev.tag}</span>}
                    {ev.text}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </>}
    </div>
  );
}

// ─── BigEventsCard: 今日 + 标签搜索历史 ───────────────────
function BigEventsCard({events,eventTags,longStats,shortStats,today,onAdd,onEdit,onDeleteTag,onAddTag}){
  const t=useT();
  const [activeTag,setActiveTag]=useState("today"); // "today"|"all"|tagName
  const [addingTag,setAddingTag]=useState(false);
  const [newTagInput,setNewTagInput]=useState("");

  const todayEvents=[...events].reverse().filter(ev=>ev.date===today);
  const filtered=
    activeTag==="today"?todayEvents:
    activeTag==="all"?[...events].reverse():
    [...events].reverse().filter(ev=>ev.tag===activeTag);

  const submitNewTag=()=>{
    const tag=newTagInput.trim();
    if(!tag)return;
    onAddTag(tag);
    setNewTagInput("");
    setAddingTag(false);
    setActiveTag(tag);
  };

  return(
    <div style={{background:"#FFFDF5",borderRadius:22,padding:"16px 16px",marginBottom:12,boxShadow:"0 4px 20px rgba(90,60,30,.08)",border:"2px solid #EDD9A3"}}>
      {/* header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#7A5C44",fontWeight:900,letterSpacing:.5}}>📰 岛上新闻</div>
        <button style={S.plusBtn} onClick={onAdd}>{t("＋ 记录","＋ Add")}</button>
      </div>

      {/* tag filter */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        {/* 今日 tab */}
        <button onClick={()=>setActiveTag("today")}
          style={{fontSize:11,fontWeight:activeTag==="today"?900:600,borderRadius:18,padding:"4px 12px",border:`2px solid ${activeTag==="today"?"#a7c957":"#D4EED4"}`,background:activeTag==="today"?"#a7c957":"#F8FFF8",color:activeTag==="today"?"#fff":"#5BAF5F",cursor:"pointer",transition:"all .15s"}}>
          今日 {todayEvents.length}
        </button>
        {/* 全部 tab */}
        <button onClick={()=>setActiveTag("all")}
          style={{fontSize:11,fontWeight:activeTag==="all"?900:600,borderRadius:18,padding:"4px 12px",border:`2px solid ${activeTag==="all"?"#5BAF5F":"#D4EED4"}`,background:activeTag==="all"?"#5BAF5F":"#F8FFF8",color:activeTag==="all"?"#fff":"#5BAF5F",cursor:"pointer",transition:"all .15s"}}>
          全部
        </button>
        {/* tag pills */}
        {[...eventTags].sort((a,b)=>{
          const FUNC=["任务","签到","座右铭"];
          const ai=FUNC.indexOf(a),bi=FUNC.indexOf(b);
          if(ai!==-1&&bi!==-1)return ai-bi;
          if(ai!==-1)return -1;
          if(bi!==-1)return 1;
          return 0;
        }).map(tag=>{
          const tc=getTagColor(tag,eventTags);
          const count=events.filter(ev=>ev.tag===tag).length;
          const active=activeTag===tag;
          return(
            <div key={tag} style={{display:"flex",alignItems:"center"}}>
              <button onClick={()=>setActiveTag(active?"today":tag)}
                style={{fontSize:11,fontWeight:active?900:600,borderRadius:"18px 0 0 18px",padding:"4px 10px",border:`2px solid ${tc.border}`,borderRight:"none",background:active?tc.border:tc.bg,color:tc.text,cursor:"pointer"}}>
                {tag}{count>0&&<span style={{opacity:.7}}> {count}</span>}
              </button>
              <button onClick={()=>{if(activeTag===tag)setActiveTag("today");onDeleteTag(tag);}}
                style={{fontSize:10,borderRadius:"0 18px 18px 0",padding:"4px 7px",border:`2px solid ${tc.border}`,borderLeft:"1px solid rgba(0,0,0,.1)",background:active?tc.border:tc.bg,color:tc.text,cursor:"pointer",opacity:.6}}>✕</button>
            </div>
          );
        })}
        {addingTag
          ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
            <input autoFocus value={newTagInput} onChange={e=>setNewTagInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")submitNewTag();if(e.key==="Escape"){setAddingTag(false);setNewTagInput("");}}}
              maxLength={8} placeholder="标签名…"
              style={{width:68,background:"#FFFDF5",border:"2px solid #A8D8A8",borderRadius:10,padding:"4px 8px",fontSize:12,color:"#3D2B1F",outline:"none",fontFamily:"inherit"}}/>
            <button onClick={submitNewTag} style={{fontSize:12,fontWeight:800,color:"#3A7D3E",background:"#F0FFF0",border:"2px solid #7BC67E",borderRadius:10,padding:"4px 8px",cursor:"pointer"}}>✓</button>
            <button onClick={()=>{setAddingTag(false);setNewTagInput("");}} style={{fontSize:12,color:"#B09070",background:"none",border:"none",cursor:"pointer",padding:"4px"}}>✕</button>
          </div>
          :<button onClick={()=>setAddingTag(true)}
            style={{fontSize:11,color:"#7BC67E",background:"#F0FFF0",border:"2px dashed #A8D8A8",borderRadius:18,padding:"4px 10px",cursor:"pointer",fontWeight:700}}>＋ 标签</button>
        }
      </div>

      {/* events list */}
      {filtered.length===0&&(
        <div style={{color:"#C8A880",fontSize:13,textAlign:"center",padding:"12px 0"}}>
          {activeTag==="today"?"今天还没有大事记录":activeTag==="all"?"还没有记录":` 还没有「${activeTag}」的记录`}
        </div>
      )}
      {filtered.map(ev=>{
        const tc=ev.tag?getTagColor(ev.tag,eventTags):null;
        return(
          <div key={ev.id} style={{padding:"12px 0",borderBottom:"1.5px dashed #EDD9A3"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span style={{fontSize:10,color:"#B09070",fontWeight:700}}>{ev.date}</span>
              {ev.tag&&tc&&<span style={{fontSize:10,fontWeight:800,background:tc.bg,border:`1.5px solid ${tc.border}`,color:tc.text,borderRadius:14,padding:"2px 8px"}}>{ev.tag}</span>}
              <button onClick={()=>onEdit(ev)} style={{marginLeft:"auto",background:"none",border:"none",fontSize:13,cursor:"pointer",opacity:.5,padding:"0 2px"}}>✏️</button>
            </div>
            <div style={{fontSize:13,color:"#3D2B1F",lineHeight:1.65,marginBottom:6}}>{ev.text}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ev.xp>0&&<span style={{fontSize:11,fontWeight:700,background:"#F0FFF0",border:"1.5px solid #7BC67E",color:"#3A7D3E",borderRadius:20,padding:"3px 10px"}}>🌸+{ev.xp}</span>}
              {ev.statChanges&&Object.entries(ev.statChanges).map(([k,v])=>{
                const st=longStats[k]||shortStats[k]||{};
                return<span key={k} style={{fontSize:11,fontWeight:700,background:v>=0?"#F0FFF0":"#FFF0F0",border:`1.5px solid ${v>=0?"#7BC67E":"#FF7B6B"}`,color:v>=0?"#3A7D3E":"#C0392B",borderRadius:20,padding:"3px 10px"}}>{st.icon}{v>0?"+":""}{v}</span>;
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}
const TAG_COLORS = [
  {bg:"#FFF0F0",border:"#FFB3B3",text:"#C0392B"},
  {bg:"#FFF8E8",border:"#FFD166",text:"#A06000"},
  {bg:"#F0FFF0",border:"#7BC67E",text:"#2E7D32"},
  {bg:"#EEF4FF",border:"#7BAAE0",text:"#2855A0"},
  {bg:"#F8E8FF",border:"#C9A8E8",text:"#6A3AAA"},
  {bg:"#FFF4EE",border:"#FFBB88",text:"#9A4A00"},
  {bg:"#F0FFFE",border:"#7DD4F0",text:"#1A6A8A"},
  {bg:"#FFF0FA",border:"#FFB3E8",text:"#9A2070"},
];
const getTagColor=(tag,tags)=>{
  const i=tags.indexOf(tag);
  return TAG_COLORS[i%TAG_COLORS.length]||TAG_COLORS[0];
};

  const rarityLabel={all:"全部",common:"普通",rare:"稀有",legend:"传说"};
  const filtered=filter==="all"?badges:badges.filter(b=>b.rarity===filter);
  const counts={all:badges.length,common:badges.filter(b=>b.rarity==="common").length,rare:badges.filter(b=>b.rarity==="rare").length,legend:badges.filter(b=>b.rarity==="legend").length};
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {rarities.map(r=>{
          const rc=r==="all"?null:RARITY_CFG[r];
          const active=filter===r;
          return<button key={r} onClick={()=>setFilter(r)} style={{border:`2px solid ${active?(rc?.border||"#7BC67E"):"#EDD9A3"}`,background:active?(rc?.bg||"#F0FFF0"):"#FFFDF5",color:active?(rc?.text||"#3A7D3E"):"#B09070",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:active?900:600,cursor:"pointer"}}>{rarityLabel[r]} {counts[r]}</button>;
        })}
      </div>
      {filtered.length===0&&<div style={{color:"#C8A880",fontSize:13,textAlign:"center",padding:"12px 0"}}>还没有{rarityLabel[filter]}徽章 🌱</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[...filtered].reverse().map(b=>{
          const rc=RARITY_CFG[b.rarity];
          return<div key={b.id} onClick={()=>setSelected(b)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",background:rc.bg,border:`2px solid ${rc.border}`,borderRadius:16,padding:"10px 4px",boxShadow:`0 3px 10px ${rc.glow}`}}>

            <div style={{fontSize:9,color:rc.text,textAlign:"center",lineHeight:1.3,fontWeight:800}}>{b.name}</div>

        <div style={{position:"fixed",inset:0,background:"rgba(20,40,20,.55)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setSelected(null)}>
          <div style={{background:"#FFFDF5",borderRadius:24,padding:"28px 24px",maxWidth:280,width:"90%",textAlign:"center",border:`3px solid ${RARITY_CFG[selected.rarity].border}`}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><BadgeSVG name={selected.name} rarity={selected.rarity} size={90}/></div>
            <div style={{fontSize:18,fontWeight:900,color:"#3D2B1F",marginBottom:6}}>{selected.name}</div>
            <div style={{fontSize:12,color:RARITY_CFG[selected.rarity].text,background:RARITY_CFG[selected.rarity].bg,borderRadius:20,padding:"4px 14px",display:"inline-block",marginBottom:6,fontWeight:800,border:`1.5px solid ${RARITY_CFG[selected.rarity].border}`}}>
              {RARITY_CFG[selected.rarity].star} {RARITY_CFG[selected.rarity].label}
            </div>
            <div style={{fontSize:11,color:"#B09070",marginBottom:18}}>获得于 Lv.{selected.level} · {selected.date}</div>

          </div>
        </div>
      )}
    </div>
  );
}

// ─── firework ────────────────────────────────────────────
const FW_COLORS=["#a7c957","#7fa832","#FFD166","#FF9A5C","#70B8E0","#FFB3C6","#8B5CF6","#fff"];
function Firework({onDone}){
  const t=useT();
  const particles=useMemo(()=>{
    const rockets=[
      {x:20,color:"#a7c957"},{x:50,color:"#FFD166"},{x:80,color:"#FF9A5C"},
      {x:35,color:"#70B8E0"},{x:65,color:"#8B5CF6"},
    ];
    return rockets.map((r,ri)=>({
      ...r,
      delay:ri*0.15,
      bursts:Array.from({length:16},(_,i)=>{
        const angle=(i/16)*Math.PI*2;
        const dist=55+Math.random()*40;
        return{
          tx:Math.round(Math.cos(angle)*dist),
          ty:Math.round(Math.sin(angle)*dist),
          color:FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)],
          size:4+Math.random()*4,
          delay:r.delay+0.55+Math.random()*0.1,
        };
      }),
    }));
  },[]);

  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,pointerEvents:"none",overflow:"hidden"}} onClick={onDone}>
      {/* 半透明遮罩 */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",animation:"fwFade 3s ease forwards"}}/>
      {/* 中央提示 */}
      <div style={{position:"absolute",top:"38%",left:"50%",transform:"translateX(-50%)",textAlign:"center",animation:"fwFade 3s ease forwards"}}>
        <div style={{fontSize:52,lineHeight:1,marginBottom:8,animation:"badgePop .4s cubic-bezier(.34,1.56,.64,1)"}}>🎉</div>
        <div style={{fontSize:20,fontWeight:900,color:"#fff",textShadow:"0 2px 12px rgba(0,0,0,.4)",letterSpacing:.5,padding:"0 20px"}}>{randPick(ALLDONE_TOASTS)}</div>
      </div>
      {/* 烟花 */}
      {particles.map((r,ri)=>(
        <div key={ri} style={{position:"absolute",bottom:0,left:`${r.x}%`}}>
          {/* 升空轨迹 */}
          <div style={{
            width:4,height:18,borderRadius:2,background:r.color,
            animation:`fwShoot .7s ${r.delay}s cubic-bezier(.2,.8,.4,1) forwards`,
            opacity:0,transformOrigin:"bottom center",
          }}/>
          {/* 爆炸粒子 */}
          {r.bursts.map((p,pi)=>(
            <div key={pi} style={{
              position:"absolute",bottom:220,left:2,
              width:p.size,height:p.size,borderRadius:"50%",background:p.color,
              "--tx":`${p.tx}px`,"--ty":`${p.ty}px`,
              animation:`fwBurst .8s ${p.delay}s cubic-bezier(.2,.6,.4,1) forwards`,
              opacity:0,
            }}/>
          ))}
        </div>
      ))}
    </div>
  );
}

function HabitEditor({habit,longStats,shortStats,onSave,onDelete}){
  const initD = migrateWeeklyBonus({...habit,weeklyBonus:habit.weeklyBonus||{stats:[]},weeklyTarget:habit.weeklyTarget||5,shortBonus:habit.shortBonus||{}});
  const [d,setD]=useState(initD);
  const upShort=(key,val)=>{const nb={...d.shortBonus};val!==0?nb[key]=val:delete nb[key];setD(p=>({...p,shortBonus:nb}));};
  const toggleStat=(k)=>{
    const cur=d.weeklyBonus?.stats||[];
    const next=cur.includes(k)?cur.filter(s=>s!==k):[...cur,k];
    setD(p=>({...p,weeklyBonus:{...p.weeklyBonus,stats:next}}));
  };
  const curStats=d.weeklyBonus?.stats||[];
  return<>
    <div style={S.dH}>{habit.id?"🐣 编辑打卡项":"🐣 新的伙伴来了"}</div>
    <FL>名称</FL>
    <input style={S.inp} placeholder="例：运动" value={d.label} onChange={e=>setD(p=>({...p,label:e.target.value}))}/>
    <FL>主页 Emoji</FL>
    <input style={{...S.inp,fontSize:26,textAlign:"center",width:72,marginBottom:12}} value={d.icon} onChange={e=>setD(p=>({...p,icon:e.target.value}))}/>

          onClick={()=>toggleStat(k)}>
          <span style={{fontSize:15}}>{st.icon}</span>
          <span style={{fontSize:11,color:on?"#3A7D3E":"#7A5C44",fontWeight:700}}>{st.label}+1</span>
          {on&&<span style={{fontSize:10,color:"#5BAF5F"}}>✓</span>}
        </button>;
      })}
    </div>
    <FL>每周目标次数（达到后获得周成就）</FL>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
      {[1,2,3,4,5,6,7].map(n=>(
        <button key={n} onClick={()=>setD(p=>({...p,weeklyTarget:n}))}
          style={{width:38,height:38,borderRadius:10,border:`2px solid ${d.weeklyTarget===n?"#7BC67E":"#EDD9A3"}`,background:d.weeklyTarget===n?"#F0FFF0":"#FFFDF5",color:d.weeklyTarget===n?"#3A7D3E":"#B09070",fontWeight:d.weeklyTarget===n?900:600,cursor:"pointer",fontSize:13}}>{n}</button>
      ))}
    </div>
    <FL>今日属性加减（心情/体力，负数为减分）</FL>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
      {Object.entries(shortStats).map(([k,st])=>(
        <div key={k} style={S.bonusItem}><span style={{fontSize:15}}>{st.icon}</span><span style={{fontSize:11,color:"#7A5C44",fontWeight:700}}>{st.label}</span>
          <input type="number" min="-99" max="99" style={S.nudgeInp} value={d.shortBonus[k]||""} placeholder="0" onChange={e=>upShort(k,Number(e.target.value))}/></div>
      ))}
    </div>
    <button style={S.cfmBtn} onClick={()=>onSave(d)}>保存</button>
    {onDelete&&<button style={{...S.cfmBtn,marginTop:8,background:"#FFF0EE",color:"#C0392B",boxShadow:"none",border:"2px solid #FFB3A8"}} onClick={onDelete}>删除此打卡项</button>}
  </>;
}

<script>
if('serviceWorker' in navigator){
  // 把 SW 代码写成字符串，通过 Blob URL 注册，无需独立 sw.js 文件
  const CACHE = 'island-v1';
  const ASSETS = [
    'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js',
    'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap',
  ];

  const swCode = `
const CACHE_NAME = '${CACHE}';
const ASSETS = ${JSON.stringify(ASSETS)};

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // 只缓存 GET 请求，跳过 Firebase API 调用
  if(e.request.method !== 'GET') return;
  const url = e.request.url;
  if(url.includes('firestore.googleapis.com') || url.includes('identitytoolkit') || url.includes('securetoken')) return;

  e.respondWith(
    caches.match(e.request).then(cached => {
      if(cached){
        // 缓存命中：直接返回，同时后台更新
        fetch(e.request).then(res => {
          if(res && res.status === 200){
            caches.open(CACHE_NAME).then(c => c.put(e.request, res));
          }
        }).catch(()=>{});
        return cached;
      }
      // 未缓存：走网络，成功后存入缓存
      return fetch(e.request).then(res => {
        if(res && res.status === 200 && e.request.url.startsWith('https')){
          const clone = res.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return res;
      });
    })
  );
});
`;

  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'})
    .then(reg => console.log('SW registered, scope:', reg.scope))
    .catch(err => console.warn('SW registration failed:', err));
}
</script>
